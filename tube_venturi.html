<script type="module">
/* ═════════════════════════ Paramètres ═════════════════════════ */
const url=new URLSearchParams(location.search);
const IS_TOUCH=matchMedia('(pointer:coarse)').matches;
const SMALL=IS_TOUCH&&Math.min(screen.width,screen.height)<560;
/* grille NON cubique : tube long et fin couché le long de X */
const SC_F=SMALL?.62:IS_TOUCH?.78:1;
const GX=Math.round(96*SC_F),GY=Math.round(32*SC_F),GZ=GY;
/* profil du tube : rayon R(x) en cellules — conduite R0, col RT au milieu */
const R0=GY*.30, RT=GY*.135, XC=GX/2, LT=GX*.055; // rayon nominal, col, centre, demi-longueur du col
const TUBE_L=8.0;                                  // longueur monde du tube
const X0=3.0,X1=GX-4.0;                            // bornes axiales sim
const SCALE=TUBE_L/(X1-X0);
const CY=GY/2,CZ=GZ/2;                             // axe du tube (y,z)
const P_RADIUS=0.62;
const DIAM_W=2*P_RADIUS*SCALE;
const FOV=36*Math.PI/180;
const DT=0.22,SUBSTEPS=2;
const SPACING=0.70;
const FIXED_POINT=1e7;
let THEME=url.get('theme')||'light';
let PAL_I=(parseInt(url.get('pal'))||0)%4;
let FLOW=0.6;                                      // force axiale « pompe » (slider)
let PAUSED=false;
const PALS=[
 {name:'Bleu',   abs:[[1.90,.85,.18],[2.40,1.15,.26]], glow:[[.16,.32,.70],[.05,.18,.85]], gk:[.28,.58],
  edge:[[.18,.30,.52],[.25,.63,1.0]]},
 {name:'Cyan',   abs:[[1.80,.42,.38],[2.30,.50,.55]], glow:[[.10,.44,.62],[.02,.38,.60]], gk:[.20,.30],
  edge:[[.14,.36,.46],[.15,.85,1.0]]},
 {name:'Rouge',  abs:[[.22,2.4,2.7],[.30,3.0,3.3]],   glow:[[.66,.10,.14],[.60,.04,.08]], gk:[.24,.34],
  edge:[[.52,.14,.19],[1.0,.30,.38]]},
 {name:'Émeraude',abs:[[1.7,.30,1.25],[2.2,.38,1.7]], glow:[[.08,.52,.34],[.02,.46,.28]], gk:[.20,.30],
  edge:[[.12,.40,.28],[.18,.95,.62]]},
];
const SUN_W=norm3([.45,.85,.42]);
/* deux appareils : venturi lisse (convergent doux) ou diaphragme à arête vive
   (plaque mince) — seul le second crée une vraie vena contracta en aval */
let MODE='venturi';
const PLATE=1.1;                                   // demi-épaisseur de la plaque (cellules)
function tubeR(x){
  const d=Math.abs(x-XC);
  if(MODE==='orifice')return d<PLATE?RT:R0;
  const t=Math.min(1,Math.max(0,(d-LT*.5)/(LT*1.6)));
  const s=t*t*(3-2*t);
  return RT+(R0-RT)*s;
}

/* ═════════════════════════ mat4 (colonne-major) ═════════════════════════ */
function norm3(v){const l=Math.hypot(v[0],v[1],v[2])||1;return[v[0]/l,v[1]/l,v[2]/l]}
function m4mul(a,b){const o=new Float32Array(16);
  for(let c=0;c<4;c++)for(let r=0;r<4;r++){let s=0;for(let k=0;k<4;k++)s+=a[k*4+r]*b[c*4+k];o[c*4+r]=s}
  return o}
function m4persp(fov,asp,n,f){const t=1/Math.tan(fov/2),o=new Float32Array(16);
  o[0]=t/asp;o[5]=t;o[10]=f/(n-f);o[11]=-1;o[14]=n*f/(n-f);return o}
function m4invPersp(p){const o=new Float32Array(16);
  o[0]=1/p[0];o[5]=1/p[5];o[11]=1/p[14];o[14]=-1;o[15]=p[10]/p[14];return o}
function m4lookAt(e,c,u){
  const z=norm3([e[0]-c[0],e[1]-c[1],e[2]-c[2]]);
  let x=[u[1]*z[2]-u[2]*z[1],u[2]*z[0]-u[0]*z[2],u[0]*z[1]-u[1]*z[0]];x=norm3(x);
  const y=[z[1]*x[2]-z[2]*x[1],z[2]*x[0]-z[0]*x[2],z[0]*x[1]-z[1]*x[0]];
  return new Float32Array([x[0],y[0],z[0],0,x[1],y[1],z[1],0,x[2],y[2],z[2],0,
    -(x[0]*e[0]+x[1]*e[1]+x[2]*e[2]),-(y[0]*e[0]+y[1]*e[1]+y[2]*e[2]),-(z[0]*e[0]+z[1]*e[1]+z[2]*e[2]),1])}
function m4invRigid(m){const o=new Float32Array(16);
  for(let c=0;c<3;c++)for(let r=0;r<3;r++)o[c*4+r]=m[r*4+c];
  o[12]=-(o[0]*m[12]+o[4]*m[13]+o[8]*m[14]);
  o[13]=-(o[1]*m[12]+o[5]*m[13]+o[9]*m[14]);
  o[14]=-(o[2]*m[12]+o[6]*m[13]+o[10]*m[14]);o[15]=1;return o}

/* ═════════════════════════ WGSL ═════════════════════════ */
const RU_WGSL=/*wgsl*/`
struct RU{
  texelSize:vec2f, sphereSize:f32, pad0:f32,
  projectionMatrix:mat4x4f, invProjectionMatrix:mat4x4f,
  viewModelMatrix:mat4x4f,
  invViewMatrix:mat4x4f,
  viewMatrix:mat4x4f,
  cubeMatrix:mat4x4f,        // grille → monde (maillage du tube)
}`;
const FSQ_WGSL=/*wgsl*/`
struct FSOut{@builtin(position) position:vec4f, @location(0) uv:vec2f, @location(1) iuv:vec2f}
override tw:f32; override th:f32;
@vertex fn vs(@builtin(vertex_index) vi:u32)->FSOut{
  var p=array(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));
  let pos=p[vi];
  let uv=vec2f((pos.x+1)*.5, 1.-(pos.y+1)*.5);
  return FSOut(vec4f(pos,0,1),uv,uv*vec2f(tw,th));
}`;
const SIM_COMMON=/*wgsl*/`
struct Particle{position:vec3f, v:vec3f, C:mat3x3f}
override fixedPointMultiplier:f32;
fn encodeFixedPoint(f:f32)->i32{return i32(f*fixedPointMultiplier);}
fn decodeFixedPoint(fp:i32)->f32{return f32(fp)*(1./fixedPointMultiplier);}`;

const CLEAR_WGSL=/*wgsl*/`
struct Cell{vx:i32,vy:i32,vz:i32,mass:i32}
@group(0) @binding(0) var<storage,read_write> cells:array<Cell>;
@compute @workgroup_size(64) fn clearGrid(@builtin(global_invocation_id) id:vec3u){
  if(id.x<arrayLength(&cells)){cells[id.x]=Cell(0,0,0,0);}
}`;

const P2G1_WGSL=SIM_COMMON+/*wgsl*/`
struct Cell{vx:atomic<i32>,vy:atomic<i32>,vz:atomic<i32>,mass:atomic<i32>}
@group(0) @binding(0) var<storage,read> particles:array<Particle>;
@group(0) @binding(1) var<storage,read_write> cells:array<Cell>;
@group(0) @binding(2) var<uniform> initBoxSize:vec3f;
@group(0) @binding(3) var<uniform> numParticles:u32;
@compute @workgroup_size(64) fn p2g_1(@builtin(global_invocation_id) id:vec3u){
  if(id.x<numParticles){
    var weights:array<vec3f,3>;
    let particle=particles[id.x];
    let cellIndex:vec3f=floor(particle.position);
    let cellDiff:vec3f=particle.position-(cellIndex+0.5);
    weights[0]=0.5*(0.5-cellDiff)*(0.5-cellDiff);
    weights[1]=0.75-cellDiff*cellDiff;
    weights[2]=0.5*(0.5+cellDiff)*(0.5+cellDiff);
    let C:mat3x3f=particle.C;
    for(var gx=0;gx<3;gx++){for(var gy=0;gy<3;gy++){for(var gz=0;gz<3;gz++){
      let weight:f32=weights[gx].x*weights[gy].y*weights[gz].z;
      let cellX=vec3f(cellIndex.x+f32(gx)-1.,cellIndex.y+f32(gy)-1.,cellIndex.z+f32(gz)-1.);
      let cellDist=(cellX+0.5)-particle.position;
      let Q:vec3f=C*cellDist;
      let massContrib:f32=weight;
      let velContrib:vec3f=massContrib*(particle.v+Q);
      let ci:i32=i32(cellX.x)*i32(initBoxSize.y)*i32(initBoxSize.z)+
                 i32(cellX.y)*i32(initBoxSize.z)+i32(cellX.z);
      atomicAdd(&cells[ci].mass,encodeFixedPoint(massContrib));
      atomicAdd(&cells[ci].vx,encodeFixedPoint(velContrib.x));
      atomicAdd(&cells[ci].vy,encodeFixedPoint(velContrib.y));
      atomicAdd(&cells[ci].vz,encodeFixedPoint(velContrib.z));
    }}}
  }
}`;

const P2G2_WGSL=SIM_COMMON+/*wgsl*/`
struct Cell{vx:atomic<i32>,vy:atomic<i32>,vz:atomic<i32>,mass:i32}
override stiffness:f32; override restDensity:f32; override dynamicViscosity:f32;
@group(0) @binding(0) var<storage,read> particles:array<Particle>;
@group(0) @binding(1) var<storage,read_write> cells:array<Cell>;
@group(0) @binding(2) var<uniform> initBoxSize:vec3f;
@group(0) @binding(3) var<uniform> numParticles:u32;
@group(0) @binding(4) var<storage,read_write> densities:array<f32>;
@group(0) @binding(5) var<uniform> dt:f32;
@compute @workgroup_size(64) fn p2g_2(@builtin(global_invocation_id) id:vec3u){
  if(id.x<numParticles){
    var weights:array<vec3f,3>;
    let particle=particles[id.x];
    let cellIndex:vec3f=floor(particle.position);
    let cellDiff:vec3f=particle.position-(cellIndex+0.5);
    weights[0]=0.5*(0.5-cellDiff)*(0.5-cellDiff);
    weights[1]=0.75-cellDiff*cellDiff;
    weights[2]=0.5*(0.5+cellDiff)*(0.5+cellDiff);
    var density:f32=0.;
    for(var gx=0;gx<3;gx++){for(var gy=0;gy<3;gy++){for(var gz=0;gz<3;gz++){
      let weight:f32=weights[gx].x*weights[gy].y*weights[gz].z;
      let cellX=vec3f(cellIndex.x+f32(gx)-1.,cellIndex.y+f32(gy)-1.,cellIndex.z+f32(gz)-1.);
      let ci:i32=i32(cellX.x)*i32(initBoxSize.y)*i32(initBoxSize.z)+
                 i32(cellX.y)*i32(initBoxSize.z)+i32(cellX.z);
      density+=decodeFixedPoint(cells[ci].mass)*weight;
    }}}
    let volume:f32=1./density;
    densities[id.x]=density;
    let pressure:f32=max(-0.0,stiffness*(pow(density/restDensity,1.)-1.));
    var stress:mat3x3f=mat3x3f(-pressure,0,0, 0,-pressure,0, 0,0,-pressure);
    let dudv:mat3x3f=particle.C;
    let strain:mat3x3f=dudv+transpose(dudv);
    stress+=dynamicViscosity*strain;
    let eq16=-volume*4.*stress*dt;
    for(var gx=0;gx<3;gx++){for(var gy=0;gy<3;gy++){for(var gz=0;gz<3;gz++){
      let weight:f32=weights[gx].x*weights[gy].y*weights[gz].z;
      let cellX=vec3f(cellIndex.x+f32(gx)-1.,cellIndex.y+f32(gy)-1.,cellIndex.z+f32(gz)-1.);
      let cellDist=(cellX+0.5)-particle.position;
      let ci:i32=i32(cellX.x)*i32(initBoxSize.y)*i32(initBoxSize.z)+
                 i32(cellX.y)*i32(initBoxSize.z)+i32(cellX.z);
      let momentum:vec3f=eq16*weight*cellDist;
      atomicAdd(&cells[ci].vx,encodeFixedPoint(momentum.x));
      atomicAdd(&cells[ci].vy,encodeFixedPoint(momentum.y));
      atomicAdd(&cells[ci].vz,encodeFixedPoint(momentum.z));
    }}}
  }
}`;

const UPDATE_WGSL=SIM_COMMON+/*wgsl*/`
struct Cell{vx:i32,vy:i32,vz:i32,mass:i32}
struct SimU{gravity:vec3f, phase:f32, impulse:vec3f, pad:f32}
@group(0) @binding(0) var<storage,read_write> cells:array<Cell>;
@group(0) @binding(1) var<uniform> realBoxSize:vec3f;
@group(0) @binding(2) var<uniform> initBoxSize:vec3f;
@group(0) @binding(3) var<uniform> simu:SimU;
@group(0) @binding(4) var<uniform> dt:f32;
@compute @workgroup_size(64) fn updateGrid(@builtin(global_invocation_id) id:vec3u){
  if(id.x<arrayLength(&cells)){
    if(cells[id.x].mass>0){
      var v:vec3f=vec3f(decodeFixedPoint(cells[id.x].vx),
        decodeFixedPoint(cells[id.x].vy),decodeFixedPoint(cells[id.x].vz));
      v/=decodeFixedPoint(cells[id.x].mass);
      v*=.998;                             /* écoulement : très faible amortissement */
      v+=simu.gravity*dt;
      v+=simu.impulse;                     /* pulse de pression (bouton) */
      cells[id.x].vx=encodeFixedPoint(v.x);
      cells[id.x].vy=encodeFixedPoint(v.y);
      cells[id.x].vz=encodeFixedPoint(v.z);
      let y:i32=(i32(id.x)/i32(initBoxSize.z))%i32(initBoxSize.y);
      let z:i32=i32(id.x)%i32(initBoxSize.z);
      if(y<2||y>i32(ceil(realBoxSize.y)-3)){cells[id.x].vy=0;}
      if(z<2||z>i32(ceil(realBoxSize.z)-3)){cells[id.x].vz=0;}
    }
  }
}`;

const G2P_WGSL=SIM_COMMON+/*wgsl*/`
struct Cell{vx:i32,vy:i32,vz:i32,mass:i32}
override R0:f32; override RT:f32; override XC:f32; override LT:f32;
override CY:f32; override CZ:f32; override X0:f32; override X1:f32;
override SHARP:f32; override PLATE:f32;
fn tubeR(x:f32)->f32{
  let d=abs(x-XC);
  if(SHARP>.5){return select(R0,RT,d<PLATE);}      /* diaphragme à arête vive */
  return mix(RT,R0,smoothstep(LT*0.5,LT*1.6,d));   /* venturi lisse */
}
@group(0) @binding(0) var<storage,read_write> particles:array<Particle>;
@group(0) @binding(1) var<storage,read> cells:array<Cell>;
@group(0) @binding(2) var<uniform> realBoxSize:vec3f;
@group(0) @binding(3) var<uniform> initBoxSize:vec3f;
@group(0) @binding(4) var<uniform> numParticles:u32;
@group(0) @binding(5) var<uniform> dt:f32;
@compute @workgroup_size(64) fn g2p(@builtin(global_invocation_id) id:vec3u){
  if(id.x<numParticles){
    particles[id.x].v=vec3f(0.);
    var weights:array<vec3f,3>;
    let particle=particles[id.x];
    let cellIndex:vec3f=floor(particle.position);
    let cellDiff:vec3f=particle.position-(cellIndex+0.5);
    weights[0]=0.5*(0.5-cellDiff)*(0.5-cellDiff);
    weights[1]=0.75-cellDiff*cellDiff;
    weights[2]=0.5*(0.5+cellDiff)*(0.5+cellDiff);
    var B:mat3x3f=mat3x3f(vec3f(0.),vec3f(0.),vec3f(0.));
    for(var gx=0;gx<3;gx++){for(var gy=0;gy<3;gy++){for(var gz=0;gz<3;gz++){
      let weight:f32=weights[gx].x*weights[gy].y*weights[gz].z;
      let cellX=vec3f(cellIndex.x+f32(gx)-1.,cellIndex.y+f32(gy)-1.,cellIndex.z+f32(gz)-1.);
      let cellDist:vec3f=(cellX+0.5)-particle.position;
      let ci:i32=i32(cellX.x)*i32(initBoxSize.y)*i32(initBoxSize.z)+
                 i32(cellX.y)*i32(initBoxSize.z)+i32(cellX.z);
      let wv:vec3f=vec3f(decodeFixedPoint(cells[ci].vx),
        decodeFixedPoint(cells[ci].vy),decodeFixedPoint(cells[ci].vz))*weight;
      B+=mat3x3f(wv*cellDist.x,wv*cellDist.y,wv*cellDist.z);
      particles[id.x].v+=wv;
    }}}
    particles[id.x].C=B*4.;
    /* plafond de vitesse (CFL) : le col accélère fortement le jet */
    let sp=length(particles[id.x].v);
    if(sp>4.2){particles[id.x].v*=4.2/sp;}
    particles[id.x].position+=particles[id.x].v*dt;
    /* ── recirculation : sorti en aval → réinjecté en amont (débit perpétuel) ── */
    if(particles[id.x].position.x>X1-1.0){
      particles[id.x].position.x-=(X1-X0)-1.5;
      particles[id.x].v=vec3f(clamp(particles[id.x].v.x,0.,1.6)*.5,
        particles[id.x].v.y*.25,particles[id.x].v.z*.25);
      particles[id.x].C=mat3x3f(vec3f(0.),vec3f(0.),vec3f(0.));
    }
    particles[id.x].position=vec3f(
      clamp(particles[id.x].position.x,1.5,realBoxSize.x-2.),
      clamp(particles[id.x].position.y,1.,realBoxSize.y-2.),
      clamp(particles[id.x].position.z,1.,realBoxSize.z-2.));
    /* ── paroi cylindrique R(x) : ressort SDF radial en (y,z), prédiction k=2 ── */
    let k=2.0; let wallStiffness=1.0;

      particles[id.x].v.y-=n.x*push;
      particles[id.x].v.z-=n.y*push;
    }
    /* butée douce en amont (derrière le point de réinjection) */
    if(xN.x<X0+.6){particles[id.x].v.x+=wallStiffness*((X0+.6)-xN.x);}

function skyColor(d,dark){
  const y=d[1];let r,g,b;
  if(dark){const t=Math.max(0,Math.min(1,(y+1)/2));
    r=.016+t*t*.18;g=.035+t*t*.30;b=.118+t*.50;}
  else{const t=Math.max(0,Math.min(1,(y+1)/2));
    r=.40+t*.58;g=.48+t*.50;b=.62+t*.38;}
  const az=Math.atan2(d[2],d[0]);
  const box=(a0,e0,wa,we,pw)=>{
    let da=Math.abs(az-a0);da=Math.min(da,6.2832-da);
    const de=Math.abs(y-e0);
    return Math.pow(Math.max(0,1-da/wa),pw)*Math.pow(Math.max(0,1-de/we),pw)};
  const win=box(.7,.55,.55,.30,1.6)*1.5+box(-2.2,.42,.40,.24,1.6)*1.1+
            box(2.6,.18,.30,.36,2)*.8+box(-.9,.75,.8,.22,1.4)*.9;
  const sun=Math.pow(Math.max(0,d[0]*SUN_W[0]+y*SUN_W[1]+d[2]*SUN_W[2]),90)*(dark?2.0:1.9);
  r+=win*(dark?.42:.55)+sun;g+=win*(dark?.55:.58)+sun;b+=win*(dark?.85:.60)+sun;
  const hor=Math.exp(-Math.abs(y+.06)*14)*(dark?.12:.22);
  r+=hor*(dark?.25:.5);g+=hor*(dark?.5:.8);b+=hor*1.1;
  return[Math.min(1,r),Math.min(1,g),Math.min(1,b)];
}
function bakeEnv(){
  const S=128;
  envTex?.destroy();
  envTex=device.createTexture({size:[S,S,6],format:'rgba8unorm',
    usage:GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST});
  const dark=THEME==='dark';
  const px=new Uint8Array(S*S*4);
  for(let f=0;f<6;f++){
    for(let j=0;j<S;j++)for(let i=0;i<S;i++){
      const s=(i+.5)/S*2-1,t=(j+.5)/S*2-1;
      let d;
      switch(f){case 0:d=[1,-t,-s];break;case 1:d=[-1,-t,s];break;
        case 2:d=[s,1,t];break;case 3:d=[s,-1,-t];break;
        case 4:d=[s,-t,1];break;default:d=[-s,-t,-1]}
      d=norm3(d);

      px[o]=c[0]*255;px[o+1]=c[1]*255;px[o+2]=c[2]*255;px[o+3]=255;

  }

   Calibration : conduite D1 = 50 mm ⇒ 1 cellule = D1/(2·R0) m.
   Vitesses grille converties en m/s via la cadence sim réelle (fps mesuré).
   Théorie : continuité v2 = v1/β², Bernoulli ΔP = ½ρ(v2²−v1²) = ½ρv2²(1−β⁴),
   débitmétrie ISO 5167 (Cd venturi ≈ 0,97), vena contracta Cc = 0,62,
   cavitation si p2 = p1 − ΔP < p_vap (σ < 1). */
const vSlider=document.getElementById('vSlider'),vVal=document.getElementById('vVal');
const calcEl=document.getElementById('calc');
const D1mm=50, beta=RT/R0, D2mm=D1mm*beta, Cc=0.62, Cd=0.97, RHO=1000,
      NU=1e-6, P1=101.3, PVAP=2.34;                       // kPa (eau 20 °C)
const CELL_M=(D1mm/1000)/(2*R0);                          // m par cellule
const A1=Math.PI*Math.pow(D1mm/2000,2);                   // m²
const MEAS={v1:0,v2:0,pending:false};
const vms=vGrid=>vGrid*CELL_M*(fps*SUBSTEPS*DT);          // cellules/u → m/s (cadence réelle)
function updCalc(v){
  const orif=MODE==='orifice';
  const CdM=orif?0.61:Cd;                                 // orifice vif ≈ .61, venturi lisse ≈ .97
  const est1=v/100*2;                                     // estimation si mesure pas prête
  const v1=MEAS.v1>0?vms(MEAS.v1):est1;
  const v2m=MEAS.v2>0?vms(MEAS.v2):0;
  const v2t=beta>0?v1/(beta*beta):0;                      // continuité (au droit de l'ouverture)
  const err=v2m>0?((v2m-v2t)/v2t*100):null;
  const vvc=v2t/Cc, Dvc=D2mm*Math.sqrt(Cc);
  /* vitesse de référence pour pression mini : au col (venturi) ou à la vena
     contracta (diaphragme, plus sévère car v_vc = v₂/Cc) */
  const vRef=orif?vvc:v2t;
  const dP=.5*RHO*(v2t*v2t-v1*v1)/1000;                   // kPa (prises amont/col)
  const pMin=P1-.5*RHO*(vRef*vRef-v1*v1)/1000;
  const sig=vRef>1e-3?(P1-PVAP)/(.5*RHO*vRef*vRef/1000):1e9;
  const cav=pMin<PVAP;
  const Q=v1*A1*3600;                                     // m³/h
  const Re1=v1*(D1mm/1000)/NU, Re2=v2t*(D2mm/1000)/NU;
  const QisoLh=CdM*(Math.PI*Math.pow(D2mm/2000,2))*Math.sqrt(Math.max(0,2*dP*1000/(RHO*(1-Math.pow(beta,4)))))*3600;
  calcEl.innerHTML=`<div class="t">${orif?'Diaphragme':'Venturi'} · sim ↔ théorie</div>
    D₁ / D₂ <b>${D1mm} / ${D2mm.toFixed(1)} mm</b><br>
    β = D₂/D₁ <b>${beta.toFixed(2)}</b><br>
    Rapport d'aires A₁/A₂ <b>${(1/(beta*beta)).toFixed(1)}</b><br>
    v₁ mesurée (sim) <b>${v1.toFixed(2)} m/s</b><br>
    v₂ mesurée (sim) <b>${v2m>0?v2m.toFixed(2)+' m/s':'—'}</b><br>
    v₂ théorie v₁/β² <b>${v2t.toFixed(2)} m/s</b><br>
    ${err!=null?`écart sim / théorie <b>${err>0?'+':''}${err.toFixed(0)} %</b><br>`:''}
    ΔP Bernoulli <b>${dP.toFixed(1)} kPa</b><br>
    p mini (${orif?'vena contracta':'col'}) <b>${pMin.toFixed(1)} kPa</b>${cav?' <b style="color:#EF3346">⚠ cavitation</b>':''}<br>
    σ cavitation <b>${sig<100?sig.toFixed(2):'—'}</b><br>
    Débit Q = v₁A₁ <b>${Q.toFixed(1)} m³/h</b><br>
    Q ISO 5167 (C𝑑 ${CdM}) <b>${QisoLh.toFixed(1)} m³/h</b><br>
    Re₁ conduite <b>${(Re1/1000).toFixed(0)} k</b><br>
    Re₂ col <b>${(Re2/1000).toFixed(0)} k</b><br>
    ${orif?`Vena contracta (C𝑐 ${Cc}) :<br>
    D𝑣𝑐 = D₂√C𝑐 <b>${Dvc.toFixed(1)} mm</b><br>
    v𝑣𝑐 = v₂/C𝑐 <b>${vvc.toFixed(2)} m/s</b>`
    :`Vena contracta : <b>sans objet</b><br>(convergent lisse — le jet colle à la paroi)`}`;
  drawChart(v1);
}
/* ── Graphe p(x) / v(x) le long du profil (analytique, continuité+Bernoulli) ── */
const chart=document.getElementById('chart'),chx=chart.getContext('2d');
function drawChart(v1){
  const W=chart.width,H=chart.height,dark=THEME==='dark';
  chx.clearRect(0,0,W,H);
  const N=110,pad=10,y0=14,h=H-y0-14;
  let vmax=0,pmin=1e9,pmax=-1e9;
  const vs=[],ps=[];
  for(let i=0;i<=N;i++){
    const x=X0+(X1-X0)*i/N;
    const vv=v1*Math.pow(R0/tubeR(x),2);
    const pp=P1+.5*RHO*(v1*v1-vv*vv)/1000;
    vs.push(vv);ps.push(pp);
    vmax=Math.max(vmax,vv);pmin=Math.min(pmin,pp);pmax=Math.max(pmax,pp);
  }
  /* profil du tube en fond */
  chx.fillStyle=dark?'rgba(90,140,220,.18)':'rgba(11,31,78,.08)';
  chx.beginPath();
  for(let i=0;i<=N;i++){const x=X0+(X1-X0)*i/N;
    chx.lineTo(pad+(W-2*pad)*i/N,H/2-(tubeR(x)/R0)*h*.30)}
  for(let i=N;i>=0;i--){const x=X0+(X1-X0)*i/N;
    chx.lineTo(pad+(W-2*pad)*i/N,H/2+(tubeR(x)/R0)*h*.30)}
  chx.fill();
  const line=(arr,lo,hi,color)=>{
    chx.strokeStyle=color;chx.lineWidth=1.6;chx.beginPath();
    for(let i=0;i<=N;i++){
      const t=hi>lo?(arr[i]-lo)/(hi-lo):.5;
      chx.lineTo(pad+(W-2*pad)*i/N,y0+h*(1-t));
    }chx.stroke()};
  line(vs,0,vmax*1.05,'#EF3346');
  line(ps,Math.min(pmin,0),pmax,dark?'#7FB2FF':'#0B1F4E');
  chx.font='700 8.5px monospace';
  chx.fillStyle='#EF3346';chx.fillText('v(x)',pad+2,y0+7);
  chx.fillStyle=dark?'#7FB2FF':'#0B1F4E';chx.fillText('p(x)',pad+30,y0+7);
  if(pmin<PVAP){chx.fillStyle='#EF3346';chx.fillText('⚠ p<p_vap au col',W-104,y0+7)}
}
const setSpeed=v=>{FLOW=v/100;vVal.textContent=v;updCalc(v)};
vSlider.addEventListener('input',e=>setSpeed(+e.target.value));
setSpeed(+vSlider.value);
if(url.has('kick'))setInterval(()=>pulse=1,3000);

/* ═════════════════════════ Boucle ═════════════════════════ */
bakeEnv();
resize();
applyPalette();
const ruData=new Float32Array(100);
const simuData=new Float32Array(8);
const iEl=document.getElementById('i');
let last=performance.now(),fps=60,fc=0;
console.log(`Tube venturi MLS-MPM · grille ${GX}×${GY}×${GZ} · ${NP} particules · R0=${R0.toFixed(1)} col=${RT.toFixed(1)}`);
/* modèle grille→monde (translation+échelle, sans rotation : la caméra orbite) */
const model=new Float32Array(16);
model[0]=SCALE;model[5]=SCALE;model[10]=SCALE;model[15]=1;
model[12]=-(X0+X1)/2*SCALE;model[13]=-CY*SCALE;model[14]=-CZ*SCALE;
function frame(now){
  requestAnimationFrame(frame);
  const dtMs=Math.min(now-last,50);last=now;
  fps=fps*.92+.08*(1000/Math.max(dtMs,1));
  fc++;if(fc%30===0)iEl.innerHTML=`Venturi · ${NP.toLocaleString('fr')} ptcl · ${G}³ · ${Math.round(fps)} fps`;
  if(fc>240&&fc%240===0&&fps<42&&pixCap>0.9e6){pixCap*=.72;CW=0}
  resize();
  if(!drag&&!autoRot){yaw+=yawV;pitch=Math.max(-.9,Math.min(.9,pitch+pitchV));yawV*=.88;pitchV*=.88}
  if(autoRot)yaw+=.0022*dtMs*.06;
  dist+=(distT-dist)*.1;
  /* caméra orbitale (le tube reste vertical, gravité fixe) */
  const eye=[Math.sin(yaw)*Math.cos(pitch)*dist,Math.sin(pitch)*dist+.3,Math.cos(yaw)*Math.cos(pitch)*dist];
  const view=m4lookAt(eye,[0,0,0],[0,1,0]);
  const proj=m4persp(FOV,CW/CH,.1,60);
  const viewModel=m4mul(view,model);
  ruData[0]=1/CW;ruData[1]=1/CH;ruData[2]=DIAM_W;ruData[3]=0;
  ruData.set(proj,4);ruData.set(m4invPersp(proj),20);ruData.set(viewModel,36);
  ruData.set(m4invRigid(view),52);ruData.set(view,68);ruData.set(model,84);
  device.queue.writeBuffer(ruBuf,0,ruData);
  /* force axiale « pompe » + très légère gravité transverse */
  simuData[0]=FLOW;simuData[1]=-.05;simuData[2]=0;
  simuData[3]=0;
  if(pulse){simuData[4]=1.2;pulse=0}else simuData[4]=0;
  simuData[5]=0;simuData[6]=0;
  device.queue.writeBuffer(simuBuf,0,simuData);
  /* halos : col de la vanne (la restriction « travaille ») */
  {
    const dark=THEME==='dark'?1:0,p=PALS[PAL_I];
    const gc=p.glow[dark],breath=.8+.2*Math.sin(now*.0016);
    const w1=gridToWorld([XC,CY,CZ]),w2=gridToWorld([XC+LT*1.4,CY,CZ]);
    glowData.set([w1[0],w1[1],w1[2],TUBE_L*.055,gc[0]*.7+.15,gc[1]*.7+.25,gc[2]*.7+.45,(dark?.55:.20)*breath],0);
    glowData.set([w2[0],w2[1],w2[2],TUBE_L*.04,gc[0],gc[1],gc[2],(dark?.32:.12)*breath],8);
    device.queue.writeBuffer(glowVB,0,glowData);
  }
  device.queue.writeBuffer(glassBuf,48,new Float32Array([now*.001]));
  const enc=device.createCommandEncoder();
  const wgP=Math.ceil(NP/64),wgC=Math.ceil(CELLS/64);
  for(let s=0;s<(PAUSED?0:SUBSTEPS);s++){
    const c=enc.beginComputePass();
    c.setPipeline(pipes.clear);c.setBindGroup(0,bgs.clear);c.dispatchWorkgroups(wgC);
    c.setPipeline(pipes.p2g1);c.setBindGroup(0,bgs.p2g1);c.dispatchWorkgroups(wgP);
    c.setPipeline(pipes.p2g2);c.setBindGroup(0,bgs.p2g2);c.dispatchWorkgroups(wgP);
    c.setPipeline(pipes.upd);c.setBindGroup(0,bgs.upd);c.dispatchWorkgroups(wgC);
    c.setPipeline(pipes.g2p);c.setBindGroup(0,bgs.g2p);c.dispatchWorkgroups(wgP);
    c.end();
  }
  /* mesure GPU des vitesses moyennes (conduite + col), relecture asynchrone */
  let doMeas=false;
  if(!PAUSED&&!MEAS.pending&&fc%30===0){
    doMeas=true;
    device.queue.writeBuffer(statBuf,0,new Int32Array(4));
    const c=enc.beginComputePass();
    c.setPipeline(pipes.stats);c.setBindGroup(0,bgs.stats);c.dispatchWorkgroups(wgP);
    c.end();
    enc.copyBufferToBuffer(statBuf,0,statRead,0,16);
  }
  const pass=(view,clear,load)=>enc.beginRenderPass({colorAttachments:[{view,
    clearValue:clear,loadOp:load||'clear',storeOp:'store'}]});
  {
    const p=pass(bgTex.createView(),{r:0,g:0,b:0,a:1});
    p.setPipeline(pipes.backdrop);p.setBindGroup(0,bgs.backdrop);p.draw(3);
    p.setPipeline(pipes.glassBack);p.setBindGroup(0,bgs.glassBack);
    p.setVertexBuffer(0,glassVB);p.setIndexBuffer(glassIB,'uint32');p.drawIndexed(glassIdxN);
    p.setPipeline(pipes.edgeBg);p.setBindGroup(0,bgs.edgeBg);
    p.setVertexBuffer(0,edgeVB);p.draw(6,EDGE_N);
    p.setPipeline(pipes.glow);p.setBindGroup(0,bgs.glow);
    p.setVertexBuffer(0,glowVB);p.draw(6,GLOW_N);
    p.end();
  }
  {
    const p=enc.beginRenderPass({colorAttachments:[{view:depthA.createView(),
      clearValue:{r:1e5,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}],
      depthStencilAttachment:{view:zbuf.createView(),depthClearValue:1,depthLoadOp:'clear',depthStoreOp:'store'}});
    p.setPipeline(pipes.depth);p.setBindGroup(0,bgs.depth);p.draw(6,NP);p.end();
  }
  {let p=pass(depthB.createView(),{r:1e5,g:0,b:0,a:1});
   p.setPipeline(pipes.nrf1);p.setBindGroup(0,bgs.nrfX);p.draw(3);p.end();
   p=pass(depthA.createView(),{r:1e5,g:0,b:0,a:1});
   p.setPipeline(pipes.nrf1);p.setBindGroup(0,bgs.nrfY);p.draw(3);p.end();
   p=pass(depthB.createView(),{r:1e5,g:0,b:0,a:1});
   p.setPipeline(pipes.nrf2);p.setBindGroup(0,bgs.nrf2);p.draw(3);p.end()}
  {let p=pass(thickA.createView(),{r:0,g:0,b:0,a:1});
   p.setPipeline(pipes.thick);p.setBindGroup(0,bgs.thick);p.draw(6,NP);p.end();
   p=pass(thickB.createView(),{r:0,g:0,b:0,a:1});
   p.setPipeline(pipes.gauss);p.setBindGroup(0,bgs.gaussX);p.draw(3);p.end();
   p=pass(thickA.createView(),{r:0,g:0,b:0,a:1});
   p.setPipeline(pipes.gauss);p.setBindGroup(0,bgs.gaussY);p.draw(3);p.end()}
  {
    const p=pass(ctx.getCurrentTexture().createView(),{r:0,g:0,b:0,a:1});
    p.setPipeline(pipes.fluid);p.setBindGroup(0,bgs.fluid);p.draw(3);
    p.setPipeline(pipes.glassFront);p.setBindGroup(0,bgs.glassFront);
    p.setVertexBuffer(0,glassVB);p.setIndexBuffer(glassIB,'uint32');p.drawIndexed(glassIdxN);
    p.setPipeline(pipes.edgeOver);p.setBindGroup(0,bgs.edgeOver);
    p.setVertexBuffer(0,edgeVB);p.draw(6,EDGE_N/2,0,EDGE_N/2);
    p.end();
  }
  device.queue.submit([enc.finish()]);
  if(doMeas){
    MEAS.pending=true;
    statRead.mapAsync(GPUMapMode.READ).then(()=>{
      const a=new Int32Array(statRead.getMappedRange().slice(0));
      statRead.unmap();
      if(a[0]>30)MEAS.v1=a[1]/1e4/a[0];
      if(a[2]>30)MEAS.v2=a[3]/1e4/a[2];
      MEAS.pending=false;
      updCalc(+vSlider.value);
    }).catch(()=>{MEAS.pending=false});
  }
}
requestAnimationFrame(frame);
addEventListener('resize',resize);
</script></body></html>
