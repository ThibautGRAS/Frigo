<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Water Cube</title>
<script type="importmap">{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
}}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#03080F;overflow:hidden;touch-action:none;font-family:sans-serif}
#hud{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.btn{background:rgba(0,80,200,.22);border:1px solid rgba(40,140,255,.35);color:rgba(140,200,255,.9);
  font:700 11px/1 sans-serif;letter-spacing:1.5px;padding:11px 20px;border-radius:100px;
  cursor:pointer;text-transform:uppercase;touch-action:manipulation;user-select:none;
  transition:.15s;-webkit-tap-highlight-color:transparent}
.btn:active{background:rgba(0,80,220,.5);transform:scale(.93)}
#lbl{position:fixed;top:16px;left:50%;transform:translateX(-50%);
  color:rgba(100,180,255,.35);font:10px/1 monospace;letter-spacing:3px;text-transform:uppercase}
</style>
</head>
<body>
<div id="lbl">DRAG · PINCH · TILT</div>
<div id="hud">
  <button class="btn" id="bW">🌊 Vague</button>
  <button class="btn" id="bLvl">📈 Niveau</button>
  <button class="btn" id="bCol">💧 Couleur</button>
</div>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {OutputPass} from 'three/addons/postprocessing/OutputPass.js';

/* ══ Renderer ══ */
const DPR=Math.min(devicePixelRatio,2);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(DPR);renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.08;
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
/* !! clipping planes activés pour l'effet "niveau d'eau" !! */
renderer.localClippingEnabled=true;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x03080F);
scene.fog=new THREE.FogExp2(0x03080F,.05);

const camera=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,.1,80);
camera.position.set(0,1.8,8);camera.lookAt(0,-.1,0);
let camZT=8;

/* Post */
const rt=new THREE.WebGLRenderTarget(innerWidth*DPR,innerHeight*DPR,{samples:4});
const composer=new EffectComposer(renderer,rt);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth*DPR,innerHeight*DPR),.55,.5,.8);
composer.addPass(bloom);composer.addPass(new OutputPass());

/* ══ Lumières ══ */
scene.add(new THREE.AmbientLight(0x7AAAFF,.25));
const sun=new THREE.DirectionalLight(0xE0EEFF,1.1);
sun.position.set(4,10,5);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
Object.assign(sun.shadow.camera,{left:-5,right:5,top:5,bottom:-5,near:.1,far:25});
scene.add(sun);
const causticPt=new THREE.PointLight(0x40C8FF,3.5,12);scene.add(causticPt);
const fillPt=new THREE.PointLight(0x2050C0,1.4,8);scene.add(fillPt);
const underPt=new THREE.PointLight(0x1040A0,1.2,5);scene.add(underPt);

/* ══ Cube (tourne avec le drag) ══ */
const BOX=3,HB=BOX/2;
const cubeGroup=new THREE.Group();scene.add(cubeGroup);

/* Parois verre — très transparentes, montrent l'eau à l'intérieur */
const wallMat=new THREE.MeshPhysicalMaterial({
  color:0xB0D8FF,metalness:0,roughness:.02,
  transparent:true,opacity:.06,depthWrite:false,
  transmission:.95,thickness:.15,ior:1.50,
  clearcoat:1,clearcoatRoughness:.02,
  side:THREE.DoubleSide,envMapIntensity:1.5});
cubeGroup.add(new THREE.Mesh(new THREE.BoxGeometry(BOX,BOX,BOX),wallMat));

/* Arêtes verre */
const edgeMat=new THREE.LineBasicMaterial({color:0x60B8FF,transparent:true,opacity:.55,
  blending:THREE.AdditiveBlending,depthWrite:false});
cubeGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(BOX,BOX,BOX)),edgeMat));

/* ══ Plan de coupure horizontal (world-space) : l'eau reste à niveau ══
   Principe : le volume d'eau tourne AVEC le cube, mais est clipé PAR ce plan fixe.
   Résultat exact : l'eau reste horizontale même quand le cube penche. */
let waterY=-.15; // niveau en world-space Y
const clipAbove=new THREE.Plane(new THREE.Vector3(0,-1,0), waterY+HB*.97);
// garde tout ce qui est EN DESSOUS du plan (y ≤ waterY)

/* ══ Volume d'eau (intérieur cube, clipé au-dessus du niveau) ══ */
const PALETTES=[
  {vol:0x1055CC,att:0x002855,surf:0x1870EE,foam:0xAADDFF,em:0x002060},
  {vol:0x10A070,att:0x003025,surf:0x15C890,foam:0xAAFFDD,em:0x003020},
  {vol:0xA02080,att:0x3A0040,surf:0xCC40A0,foam:0xFFAADD,em:0x300030},
  {vol:0xC05010,att:0x401800,surf:0xEE7020,foam:0xFFD8AA,em:0x301000},
];
let pi=0;
function pal(){return PALETTES[pi];}

const volMat=new THREE.MeshPhysicalMaterial({
  color:pal().vol,metalness:0,roughness:.01,
  transparent:true,opacity:.72,depthWrite:false,
  transmission:.6,ior:1.333,thickness:2.5,
  attenuationColor:new THREE.Color(pal().att),attenuationDistance:1.2,
  clearcoat:.5,clearcoatRoughness:.08,
  side:THREE.BackSide, // vue depuis l'extérieur à travers le verre
  clippingPlanes:[clipAbove],clipIntersection:false
});
const volMesh=new THREE.Mesh(new THREE.BoxGeometry(BOX*.96,BOX*.96,BOX*.96),volMat);
cubeGroup.add(volMesh);

/* Fond du volume (face inférieure visible = eau profonde) */
const botMat=new THREE.MeshPhysicalMaterial({
  color:pal().att,metalness:0,roughness:.05,
  transparent:true,opacity:.65,depthWrite:false,
  clippingPlanes:[clipAbove]});
cubeGroup.add(new THREE.Mesh(new THREE.BoxGeometry(BOX*.96,BOX*.96,BOX*.96),botMat));

/* ══ Surface de l'eau (Gerstner waves GPU) ══
   CONTRE-ROTATION : reste horizontale en world-space même quand le cube penche */
const SRES=80;
const surfGeo=new THREE.PlaneGeometry(BOX*.93,BOX*.93,SRES,SRES);
surfGeo.rotateX(-Math.PI/2);

const surfMat=new THREE.ShaderMaterial({
  transparent:true,depthWrite:false,side:THREE.DoubleSide,
  uniforms:{
    uTime:{value:0},
    uWaterColor:{value:new THREE.Color(pal().surf)},
    uFoamColor:{value:new THREE.Color(pal().foam)},
    uDeepColor:{value:new THREE.Color(pal().att)},
    uSunDir:{value:new THREE.Vector3(.4,.9,.3).normalize()},
    uCamPos:{value:camera.position},
    uRipple:{value:new THREE.Vector4(0,0,0,0)},
  },
  vertexShader:`
uniform float uTime;uniform vec4 uRipple;
varying vec3 vPos,vN;varying vec2 vUV;varying float vFoam;
#define PI 3.141593
/* Gerstner wave : vrai mouvement cyclique 3D, plus réaliste que sin */
vec3 gerstner(vec2 p,vec2 d,float A,float L,float speed,float steep){
  float k=2.*PI/L,c=sqrt(9.8/k),w=c*k*speed;
  float f=k*dot(d,p)-w*uTime;
  float Q=steep/(k*A);
  return vec3(Q*A*d.x*cos(f), A*sin(f), Q*A*d.y*cos(f));
}
void main(){
  vUV=uv;vec3 p=position;
  /* 4 ondes Gerstner superposées */
  vec3 w =gerstner(p.xz,normalize(vec2(1.,.4)),.055,1.3,1.,.6);
  w+=      gerstner(p.xz,normalize(vec2(-.5,1.)),.04,1.8,.7,.5);
  w+=      gerstner(p.xz,normalize(vec2(.7,-.7)),.028,.9,1.2,.4);
  w+=      gerstner(p.xz,normalize(vec2(.2,.9)),.018,2.2,.55,.35);
  p+=w;
  /* ripple interactif */
  if(uRipple.z>0.){
    vec2 dp=p.xz-uRipple.xy;float r=length(dp);
    float t=uTime-uRipple.w;
    if(t>0.&&t<2.5){
      float wave=sin(r*8.-t*5.)*exp(-r*1.5-t*.8)*uRipple.z;
      p.y+=wave;
    }
  }
  vFoam=clamp(w.y*4.,0.,1.);
  vPos=(modelMatrix*vec4(p,1.)).xyz;
  /* normale approx depuis la dérivée (tangent space) */
  vec3 tang=normalize(vec3(1.,gerstner(p.xz+vec2(.01,0.),normalize(vec2(1.,.4)),.055,1.3,1.,.6).y-w.y,0.));
  vec3 btan=normalize(vec3(0.,gerstner(p.xz+vec2(0.,.01),normalize(vec2(1.,.4)),.055,1.3,1.,.6).y-w.y,1.));
  vN=normalize((modelMatrix*vec4(cross(btan,tang),0.)).xyz);
  gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);
}`,
  fragmentShader:`
uniform vec3 uWaterColor,uFoamColor,uDeepColor,uSunDir,uCamPos;
uniform float uTime;
varying vec3 vPos,vN;varying vec2 vUV;varying float vFoam;
void main(){
  vec3 n=normalize(vN);
  vec3 v=normalize(uCamPos-vPos);
  /* Fresnel — l'eau reflète plus à angle rasant */
  float F0=.02;float F=F0+(1.-F0)*pow(1.-max(0.,dot(n,v)),5.);
  /* Diffuse solaire */
  float dif=max(0.,dot(n,uSunDir));
  /* Spéculaire haute fréquence (éclat solaire) */
  float spec=pow(max(0.,dot(reflect(-uSunDir,n),v)),260.);
  /* Couleur de base (mélange profondeur/surface) */
  float depth=smoothstep(-.12,.12,vPos.y);
  vec3 col=mix(uDeepColor,uWaterColor,depth);
  col=mix(col,uFoamColor,vFoam*.45);
  /* Lumière */
  col*=.5+dif*.7;
  col+=vec3(.85,.96,1.)*spec*1.4;
  /* Réflexion env approx */
  col+=mix(uDeepColor,vec3(.6,.85,1.),F)*.25;
  /* Micro-scintillement de surface */
  float sc=fract(sin(dot(vUV,vec2(12.9898,78.233)))*43758.);
  col+=vFoam*sc*.08*vec3(.8,1.,1.2);
  float alpha=mix(.78,.92,F)+vFoam*.08;
  gl_FragColor=vec4(col,alpha);
}`
});

const surfMesh=new THREE.Mesh(surfGeo,surfMat);
cubeGroup.add(surfMesh);

/* Sol (reçoit ombres/caustiques) */
const floorM=new THREE.Mesh(new THREE.PlaneGeometry(14,14),new THREE.ShadowMaterial({opacity:.3}));
floorM.rotation.x=-Math.PI/2;floorM.position.y=-HB-.01;floorM.receiveShadow=true;
scene.add(floorM);

/* ══ Rotation drag ══ */
const rot={x:.3,y:-.35};let drag=false,lX=0,lY=0,rVX=0,rVY=0;
renderer.domElement.addEventListener('pointerdown',e=>{
  drag=true;lX=e.clientX;lY=e.clientY;rVX=rVY=0;
  renderer.domElement.setPointerCapture(e.pointerId);
});
renderer.domElement.addEventListener('pointerup',()=>drag=false);
renderer.domElement.addEventListener('pointermove',e=>{
  if(!drag)return;
  const dx=(e.clientX-lX)*.007,dy=(e.clientY-lY)*.006;
  rot.y+=dx;rot.x+=dy;lX=e.clientX;lY=e.clientY;rVX=dy;rVY=dx;
  e.preventDefault();
},{passive:false});
addEventListener('wheel',e=>{camZT=THREE.MathUtils.clamp(camZT+e.deltaY*.012,3,14);},{passive:true});
let P0=0;
renderer.domElement.addEventListener('touchstart',e=>{if(e.touches.length===2)
  P0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
renderer.domElement.addEventListener('touchmove',e=>{if(e.touches.length===2){
  const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  camZT=THREE.MathUtils.clamp(camZT-(d-P0)*.022,3,14);P0=d;e.preventDefault();
}},{passive:false});

/* Ripple au tap sur canvas */
renderer.domElement.addEventListener('click',e=>{
  if(!drag){
    const x=(e.clientX/innerWidth-.5)*BOX*.85;
    const z=(e.clientY/innerHeight-.5)*BOX*.85;
    surfMat.uniforms.uRipple.value.set(x,z,1.4,performance.now()*.001);
  }
});

/* ══ Boutons ══ */
let lvlDir=1;
document.getElementById('bW').addEventListener('click',()=>{
  const x=(Math.random()-.5)*BOX*.7,z=(Math.random()-.5)*BOX*.7;
  surfMat.uniforms.uRipple.value.set(x,z,1.8,performance.now()*.001);
});
document.getElementById('bLvl').addEventListener('click',e=>{
  lvlDir*=-1;e.target.textContent=lvlDir>0?'📈 Niveau':'📉 Niveau';
});
document.getElementById('bCol').addEventListener('click',()=>{
  pi=(pi+1)%PALETTES.length;const p=pal();
  volMat.color.setHex(p.vol);volMat.attenuationColor.setHex(p.att);
  botMat.color.setHex(p.att);
  surfMat.uniforms.uWaterColor.value.setHex(p.surf);
  surfMat.uniforms.uFoamColor.value.setHex(p.foam);
  surfMat.uniforms.uDeepColor.value.setHex(p.att);
  edgeMat.color.setHex(p.surf);
});

/* ══ Boucle ══ */
let last=performance.now();
const _invQ=new THREE.Quaternion();

function tick(now){
  requestAnimationFrame(tick);
  const dt=Math.min((now-last)/1000,.04);last=now;

  /* rotation cube avec inertie */
  if(!drag){rot.y+=rVY;rot.x+=rVX;rVX*=.85;rVY*=.85;}
  rot.x=THREE.MathUtils.clamp(rot.x,-1.35,1.35);
  cubeGroup.rotation.set(rot.x,rot.y,0);

  /* LA CLÉ : la surface d'eau CONTRE-TOURNE pour rester horizontale en world-space */
  surfMesh.quaternion.copy(cubeGroup.quaternion).invert();

  /* Niveau d'eau qui monte/descend doucement */
  waterY=THREE.MathUtils.clamp(waterY+lvlDir*.003,-.8,.6);
  clipAbove.constant=waterY+HB*.97;
  surfMesh.position.y=waterY; // en local-space = world-space Y (grâce à la contre-rotation)

  /* Surface : temps et direction solaire animée */
  surfMat.uniforms.uTime.value=now*.001;
  surfMat.uniforms.uSunDir.value.set(
    Math.cos(now*.0003),1,Math.sin(now*.0003)).normalize();

  /* Caméra zoom smooth */
  camera.position.z+=(camZT-camera.position.z)*.1;

  /* Lumières caustic (world-space, orbitent autour du cube) */
  const t=now*.001;
  causticPt.position.set(Math.cos(t*.48)*5,3.5+Math.sin(t*.31),Math.sin(t*.48)*5);
  causticPt.intensity=3.+1.2*Math.sin(t*.7);
  causticPt.color.setHSL(.58+Math.sin(t*.18)*.05,.92,.6);
  fillPt.position.set(-3,1.5,3);
  /* lumière sous l'eau = suit la contre-surface dans le repère cube */
  const wp=new THREE.Vector3(0,waterY-.3,0).applyMatrix4(cubeGroup.matrixWorld);
  underPt.position.copy(wp);
  underPt.intensity=1.1+.4*Math.sin(t*1.2);

  composer.render();
}
requestAnimationFrame(tick);

addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();composer.setSize(innerWidth,innerHeight);
  rt.setSize(innerWidth*DPR,innerHeight*DPR);
});
</script>
</body>
</html>
