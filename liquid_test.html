<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cube Liquide — Test Physique</title>
<script type="importmap">{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
}}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020912;overflow:hidden;touch-action:none;font-family:monospace}
#info{position:fixed;top:18px;left:50%;transform:translateX(-50%);
  color:rgba(120,180,255,.5);font-size:11px;letter-spacing:2px;text-transform:uppercase;pointer-events:none}
#fps{position:fixed;top:18px;right:18px;color:rgba(100,160,255,.4);font-size:10px}
</style>
</head>
<body>
<div id="info">Glisser pour incliner · Scroll pour zoomer</div>
<div id="fps"></div>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {OutputPass} from 'three/addons/postprocessing/OutputPass.js';

/* ══════════════════ RENDERER ══════════════════ */
const DPR=Math.min(devicePixelRatio,2);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(DPR);renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.12;
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020912);
scene.fog=new THREE.FogExp2(0x020912,.06);

const camera=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,.1,100);
camera.position.set(0,1.2,8);camera.lookAt(0,0,0);

/* Post-processing */
const rt=new THREE.WebGLRenderTarget(innerWidth*DPR,innerHeight*DPR,{samples:4});
const composer=new EffectComposer(renderer,rt);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth*DPR,innerHeight*DPR),.65,.52,.72);
composer.addPass(bloom);composer.addPass(new OutputPass());

/* ══════════════════ LUMIÈRES ══════════════════ */
scene.add(new THREE.AmbientLight(0x8ABAFF,.22));
const keyL=new THREE.DirectionalLight(0xD0E8FF,.9);
keyL.position.set(6,12,6);keyL.castShadow=true;
keyL.shadow.mapSize.set(1024,1024);keyL.shadow.camera.near=.1;keyL.shadow.camera.far=40;
keyL.shadow.camera.left=keyL.shadow.camera.bottom=-6;keyL.shadow.camera.right=keyL.shadow.camera.top=6;
scene.add(keyL);
/* Lumière caustic : orbite autour du cube, imite la réfraction */
const causticA=new THREE.PointLight(0x50C0FF,2.8,10);scene.add(causticA);
const causticB=new THREE.PointLight(0xFF8030,.8,8);scene.add(causticB);
/* Lumière interne : suit le centre de masse du liquide */
const innerL=new THREE.PointLight(0x3080FF,1.2,4);scene.add(innerL);

/* ══════════════════ CUBE VERRE ══════════════════ */
const BOX=3.0,HALF=BOX/2;
const cubeGroup=new THREE.Group();scene.add(cubeGroup);

/* Parois verre — 6 faces séparées pour un meilleur rendu */
const glassMat=new THREE.MeshPhysicalMaterial({
  color:0xA8D4FF,metalness:0,roughness:.04,
  transparent:true,opacity:.10,depthWrite:false,
  transmission:.88,thickness:.25,ior:1.48,
  clearcoat:1,clearcoatRoughness:.04,
  side:THREE.DoubleSide,envMapIntensity:1.8
});
const boxGeo=new THREE.BoxGeometry(BOX,BOX,BOX);
const glassBox=new THREE.Mesh(boxGeo,glassMat);
cubeGroup.add(glassBox);
/* Arêtes lumineuses */
const edgeMat=new THREE.LineBasicMaterial({
  color:0x6AAEFF,transparent:true,opacity:.7,
  blending:THREE.AdditiveBlending,depthWrite:false});
cubeGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo),edgeMat));
/* Sol réfléchissant sous le cube */
const floorMat=new THREE.ShadowMaterial({opacity:.25});
const floor=new THREE.Mesh(new THREE.PlaneGeometry(14,14),floorMat);
floor.rotation.x=-Math.PI/2;floor.position.y=-HALF-0.01;floor.receiveShadow=true;
scene.add(floor);

/* ══════════════════ PARTICULES SPH ══════════════════ */
const NP=200;          /* nombre de particules */
const R=0.155;         /* rayon particule */
const WALL=HALF-R-.005;
const G=13;            /* gravité */
const DAMP=.34;        /* restitution parois */
const VISC=.055;       /* viscosité */
const px=new Float32Array(NP),py=new Float32Array(NP),pz=new Float32Array(NP);
const vx=new Float32Array(NP),vy=new Float32Array(NP),vz=new Float32Array(NP);
/* Init : remplir le bas du cube */
(function init(){
  const cols=Math.ceil(Math.cbrt(NP*2));
  let i=0;
  for(let ix=0;ix<cols&&i<NP;ix++)
    for(let iz=0;iz<cols&&i<NP;iz++)
      for(let iy=0;iy<cols&&i<NP;iy++){
        if(iy>=cols/2)continue;
        px[i]=(ix/(cols-1)-.5)*(BOX-2*R-.1);
        py[i]=(iy/(cols/2-1)-.5)*(HALF-.1)-HALF*.3;
        pz[i]=(iz/(cols-1)-.5)*(BOX-2*R-.1);
        vy[i]=(Math.random()-.5)*.3;i++;
      }
  /* compléter avec aléatoire */
  for(;i<NP;i++){
    px[i]=(Math.random()-.5)*(BOX-2*R);
    py[i]=(Math.random()-.5)*(HALF*.7)-HALF*.2;
    pz[i]=(Math.random()-.5)*(BOX-2*R);
  }
})();

/* Sphères instanciées (1 draw call) */
const sphereGeo=new THREE.SphereGeometry(R,14,10);
/* Matériau eau / liquide bleu */
const liqMat=new THREE.MeshPhysicalMaterial({
  color:0x2A80EE,metalness:0,roughness:.04,
  transparent:true,opacity:.88,depthWrite:false,
  transmission:.35,ior:1.33,thickness:.3,
  clearcoat:1,clearcoatRoughness:.02,
  emissive:0x0030A0,emissiveIntensity:.12,
  envMapIntensity:2.0
});
const instMesh=new THREE.InstancedMesh(sphereGeo,liqMat,NP);
instMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
instMesh.castShadow=true;
cubeGroup.add(instMesh);
const dummy=new THREE.Object3D();

function pushInstances(){
  for(let i=0;i<NP;i++){
    dummy.position.set(px[i],py[i],pz[i]);
    dummy.updateMatrix();
    instMesh.setMatrixAt(i,dummy.matrix);
  }
  instMesh.instanceMatrix.needsUpdate=true;
}

/* ══════════════════ PHYSIQUE ══════════════════ */
const _gLocal=new THREE.Vector3();
const _invQ=new THREE.Quaternion();

function physicsStep(gx,gy,gz,dt){
  /* intégration Verlet sub-steppée */
  const SUBS=4,sdt=dt/SUBS;
  for(let s=0;s<SUBS;s++){
    /* gravité locale */
    for(let i=0;i<NP;i++){vx[i]+=gx*sdt;vy[i]+=gy*sdt;vz[i]+=gz*sdt;}
    /* intégrer positions */
    for(let i=0;i<NP;i++){px[i]+=vx[i]*sdt;py[i]+=vy[i]*sdt;pz[i]+=vz[i]*sdt;}
    /* collisions parois */
    for(let i=0;i<NP;i++){
      if(px[i]<-WALL){px[i]=-WALL;vx[i]=Math.abs(vx[i])*DAMP;vy[i]*=.97;vz[i]*=.97;}
      if(px[i]> WALL){px[i]= WALL;vx[i]=-Math.abs(vx[i])*DAMP;vy[i]*=.97;vz[i]*=.97;}
      if(py[i]<-WALL){py[i]=-WALL;vy[i]=Math.abs(vy[i])*DAMP;vx[i]*=.97;vz[i]*=.97;}
      if(py[i]> WALL){py[i]= WALL;vy[i]=-Math.abs(vy[i])*DAMP;vx[i]*=.97;vz[i]*=.97;}
      if(pz[i]<-WALL){pz[i]=-WALL;vz[i]=Math.abs(vz[i])*DAMP;vx[i]*=.97;vy[i]*=.97;}
      if(pz[i]> WALL){pz[i]= WALL;vz[i]=-Math.abs(vz[i])*DAMP;vx[i]*=.97;vy[i]*=.97;}
    }
    /* collisions particule-particule (O(N²) ≈ 20k ops : OK pour 200 particules) */
    const D=2*R,D2=D*D;
    for(let i=0;i<NP-1;i++){
      for(let j=i+1;j<NP;j++){
        const dx=px[j]-px[i],dy=py[j]-py[i],dz=pz[j]-pz[i];
        const r2=dx*dx+dy*dy+dz*dz;
        if(r2<D2&&r2>1e-8){
          const r=Math.sqrt(r2),ov=(D-r)*.5,ir=1/r;
          const nx=dx*ir,ny=dy*ir,nz=dz*ir;
          /* correction position */
          px[i]-=nx*ov;py[i]-=ny*ov;pz[i]-=nz*ov;
          px[j]+=nx*ov;py[j]+=ny*ov;pz[j]+=nz*ov;
          /* collision vitesses (restitution partielle) */
          const nd=(vx[i]-vx[j])*nx+(vy[i]-vy[j])*ny+(vz[i]-vz[j])*nz;
          if(nd>0){
            const imp=nd*(1+DAMP)*.5;
            vx[i]-=imp*nx;vy[i]-=imp*ny;vz[i]-=imp*nz;
            vx[j]+=imp*nx;vy[j]+=imp*ny;vz[j]+=imp*nz;
          }
          /* viscosité (mélange des vitesses) */
          vx[i]+=(vx[j]-vx[i])*VISC;vy[i]+=(vy[j]-vy[i])*VISC;vz[i]+=(vz[j]-vz[i])*VISC;
          vx[j]-=(vx[j]-vx[i])*VISC;vy[j]-=(vy[j]-vy[i])*VISC;vz[j]-=(vz[j]-vz[i])*VISC;
        }
      }
    }
  }
}

/* ══════════════════ CONTRÔLE ROTATION ══════════════════ */
const rot={x:.25,y:-.4};let drag=false,lx=0,ly=0,rvx=0,rvy=0;
renderer.domElement.addEventListener('pointerdown',e=>{
  drag=true;lx=e.clientX;ly=e.clientY;rvx=rvy=0;
  renderer.domElement.setPointerCapture(e.pointerId);
});
renderer.domElement.addEventListener('pointerup',()=>drag=false);
renderer.domElement.addEventListener('pointermove',e=>{
  if(!drag)return;
  const dx=(e.clientX-lx)*.006,dy=(e.clientY-ly)*.005;
  rot.y+=dx;rot.x+=dy;rvx=dy;rvy=dx;lx=e.clientX;ly=e.clientY;
});
addEventListener('wheel',e=>{
  camera.position.z=THREE.MathUtils.clamp(camera.position.z+e.deltaY*.01,4,14);
},{passive:true});

/* ══════════════════ BOUCLE ══════════════════ */
let last=performance.now(),frames=0,fps=60;
const fpsEl=document.getElementById('fps');
const _cm=new THREE.Vector3();

function tick(now){
  requestAnimationFrame(tick);
  const dt=Math.min((now-last)/1000,.04);last=now;
  frames++;if(frames%30===0)fpsEl.textContent=`${Math.round(fps)} fps`;
  fps=fps*.9+.1/dt;

  /* inertie rotation */
  if(!drag){rot.y+=rvy;rot.x+=rvx;rvy*=.88;rvx*=.88;}
  rot.x=THREE.MathUtils.clamp(rot.x,-1.4,1.4);
  cubeGroup.rotation.set(rot.x,rot.y,0);

  /* gravité dans repère local du cube */
  _invQ.copy(cubeGroup.quaternion).invert();
  _gLocal.set(0,-G,0).applyQuaternion(_invQ);
  physicsStep(_gLocal.x,_gLocal.y,_gLocal.z,dt);
  pushInstances();

  /* centre de masse (monde) pour lumière interne */
  let cx=0,cy=0,cz=0;
  for(let i=0;i<NP;i++){cx+=px[i];cy+=py[i];cz+=pz[i];}
  _cm.set(cx/NP,cy/NP,cz/NP).applyMatrix4(cubeGroup.matrixWorld);
  innerL.position.copy(_cm);

  /* lumières caustic orbitales */
  const t=now*.001;
  causticA.position.set(Math.cos(t*.6)*4,3+Math.sin(t*.35),Math.sin(t*.6)*4);
  causticA.color.setHSL(.58+Math.sin(t*.18)*.04,.9,.65);
  causticA.intensity=2.2+.8*Math.sin(t*.9);
  causticB.position.set(Math.cos(t*.4+2)*3.5,-1.5,Math.sin(t*.4+2)*3.5);
  causticB.intensity=.6+.4*Math.sin(t*1.1);

  composer.render();
}
requestAnimationFrame(tick);

addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
  rt.setSize(innerWidth*DPR,innerHeight*DPR);
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
});
</script>
</body>
</html>
