<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Water Cube</title>
<script type="importmap">{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
}}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020B14;overflow:hidden;touch-action:none}
#ui{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.b{background:rgba(0,60,140,.28);border:1px solid rgba(40,130,255,.3);color:rgba(120,200,255,.85);
  font:700 10px/1 monospace;letter-spacing:2px;padding:11px 18px;border-radius:100px;
  cursor:pointer;text-transform:uppercase;touch-action:manipulation;user-select:none}
.b:active{opacity:.7;transform:scale(.93)}
</style>
</head>
<body>
<div id="ui">
  <button class="b" id="bS">💧 Splash</button>
  <button class="b" id="bF">🌀 Vortex</button>
  <button class="b" id="bC">🎨 Couleur</button>
</div>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {OutputPass} from 'three/addons/postprocessing/OutputPass.js';

/* ══ Renderer ══ */
const DPR=Math.min(devicePixelRatio,2);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(DPR);renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
renderer.shadowMap.enabled=true;
renderer.localClippingEnabled=true;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020B14);
scene.fog=new THREE.FogExp2(0x020B14,.045);
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,.1,80);
camera.position.set(0,2,8);camera.lookAt(0,0,0);
let camZT=8;

/* Post */
const rt=new THREE.WebGLRenderTarget(innerWidth*DPR,innerHeight*DPR,{samples:4});
const composer=new EffectComposer(renderer,rt);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth*DPR,innerHeight*DPR),.7,.45,.72);
composer.addPass(bloom);composer.addPass(new OutputPass());

/* ══ Lumières ══ */
scene.add(new THREE.AmbientLight(0x6090C0,.3));
const sun=new THREE.DirectionalLight(0xEEF5FF,1.2);
sun.position.set(5,12,4);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
scene.add(sun);
const cL=new THREE.PointLight(0x40C8FF,3.5,14);scene.add(cL);
const cL2=new THREE.PointLight(0xFF7030,.8,10);scene.add(cL2);
const wL=new THREE.PointLight(0x2060C0,1.8,6);scene.add(wL);

/* ══ Constantes ══ */
const BOX=3,H=BOX/2;
const cubeGroup=new THREE.Group();scene.add(cubeGroup);

/* Palettes */
const PAL=[
  {vol:0x0850A0,att:0x01152A,surf1:0x1888EE,surf2:0x40D0FF,edge:0x50B8FF},
  {vol:0x0A8060,att:0x011E15,surf1:0x15C090,surf2:0x40FFD0,edge:0x40FFB0},
  {vol:0x7010A0,att:0x1A0030,surf1:0xA030D0,surf2:0xFF60FF,edge:0xC060FF},
  {vol:0xA03010,att:0x2A0800,surf1:0xEE6010,surf2:0xFFB040,edge:0xFFD060},
];
let pi=0;function pal(){return PAL[pi];}

/* ══ SIMULATION GPU — plan horizontal dans repère LOCAL du cube ══
   Clé physique : la gravité dans le repère local change quand on tourne le cube.
   Les composantes X/Z de cette gravité locale poussent l'eau → vrai slosh. */
const SIM=512;
const rtOpt={type:THREE.FloatType,format:THREE.RGBAFormat,
  minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,
  wrapS:THREE.ClampToEdgeWrapping,wrapT:THREE.ClampToEdgeWrapping};
let rtA=new THREE.WebGLRenderTarget(SIM,SIM,rtOpt);
let rtB=new THREE.WebGLRenderTarget(SIM,SIM,rtOpt);
let rtNorm=new THREE.WebGLRenderTarget(SIM,SIM,rtOpt);
const simCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const simScene=new THREE.Scene();

/* Shader simulation : équation des ondes 2D + force de gravité locale */
const simMat=new THREE.ShaderMaterial({
  uniforms:{
    uPrev:{value:null},uCurr:{value:null},
    uGX:{value:0},uGZ:{value:0},   // gravité locale X,Z (change avec rotation)
    uSpeed:{value:.24},uDamp:{value:.988},
    uDrop:{value:new THREE.Vector4(-2,-2,0,0)},
    uRes:{value:new THREE.Vector2(SIM,SIM)},
  },
  vertexShader:`void main(){gl_Position=vec4(position,1.);}`,
  fragmentShader:`
uniform sampler2D uPrev,uCurr;
uniform vec2 uRes;uniform vec4 uDrop;
uniform float uSpeed,uDamp,uGX,uGZ;
void main(){
  vec2 uv=gl_FragCoord.xy/uRes, px=1./uRes;
  float c=texture2D(uCurr,uv).r;
  float p=texture2D(uPrev,uv).r;
  float L=texture2D(uCurr,uv-vec2(px.x,0)).r;
  float R=texture2D(uCurr,uv+vec2(px.x,0)).r;
  float D=texture2D(uCurr,uv-vec2(0,px.y)).r;
  float U=texture2D(uCurr,uv+vec2(0,px.y)).r;
  /* Équation des ondes discrète */
  float next=2.*c - p + uSpeed*(L+R+D+U - 4.*c);
  /* Force de gravité locale → équilibre penché = SLOSH RÉEL */
  vec2 pos=uv-.5;
  float eq=(pos.x*uGX + pos.y*uGZ)*.55;
  next+=(eq-c)*.028;
  next*=uDamp;
  next=clamp(next,-1.,1.);
  /* Perturbation interactive */
  if(uDrop.z>0.){
    vec2 d=uv-uDrop.xy; float r2=dot(d,d),r=uDrop.w*uDrop.w;
    if(r2<r) next+=uDrop.z*(1.-r2/r);
  }
  gl_FragColor=vec4(next,0,0,1);
}`,depthTest:false,depthWrite:false
});
simScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),simMat));

/* Shader normales */
const normScene=new THREE.Scene();
const normMat=new THREE.ShaderMaterial({
  uniforms:{uH:{value:null},uRes:{value:new THREE.Vector2(SIM,SIM)},uS:{value:.42}},
  vertexShader:`void main(){gl_Position=vec4(position,1.);}`,
  fragmentShader:`
uniform sampler2D uH;uniform vec2 uRes;uniform float uS;
void main(){
  vec2 px=1./uRes,uv=gl_FragCoord.xy/uRes;
  float L=texture2D(uH,uv-vec2(px.x,0)).r,R=texture2D(uH,uv+vec2(px.x,0)).r;
  float D=texture2D(uH,uv-vec2(0,px.y)).r,U=texture2D(uH,uv+vec2(0,px.y)).r;
  vec3 n=normalize(vec3((L-R)*uS,(D-U)*uS,1.));
  gl_FragColor=vec4(n*.5+.5,1.);
}`,depthTest:false,depthWrite:false
});
normScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),normMat));

function stepSim(drop){
  simMat.uniforms.uDrop.value.set(
    drop?drop.x:-2,drop?drop.y:-2,drop?drop.z:0,drop?drop.w:.08);
  simMat.uniforms.uCurr.value=rtA.texture;
  simMat.uniforms.uPrev.value=rtB.texture;
  renderer.setRenderTarget(rtB);renderer.render(simScene,simCam);
  normMat.uniforms.uH.value=rtB.texture;
  renderer.setRenderTarget(rtNorm);renderer.render(normScene,simCam);
  renderer.setRenderTarget(null);
  [rtA,rtB]=[rtB,rtA];
}

/* ══ Surface eau — dans le repère LOCAL du cube (tourne avec lui) ══ */
const SRES=128;
const surfGeo=new THREE.PlaneGeometry(BOX*.95,BOX*.95,SRES,SRES);
surfGeo.rotateX(-Math.PI/2);
const p=pal();
const surfMat=new THREE.ShaderMaterial({
  transparent:true,depthWrite:false,side:THREE.DoubleSide,
  uniforms:{
    uHeight:{value:null},uNormal:{value:null},
    uAmp:{value:.28},uTime:{value:0},
    uColor1:{value:new THREE.Color(p.surf1)},
    uColor2:{value:new THREE.Color(p.surf2)},
    uSun:{value:sun.position.clone().normalize()},
    uEye:{value:camera.position},
  },
  vertexShader:`
uniform sampler2D uHeight;uniform float uAmp;
varying vec2 vUV;varying float vH;varying vec3 vWP,vWN;
void main(){
  vUV=uv;
  float h=texture2D(uHeight,uv).r;vH=h;
  vec3 pos=position;pos.y+=h*uAmp;
  vWP=(modelMatrix*vec4(pos,1.)).xyz;
  /* Normale depuis la height-map */
  vec2 d=vec2(1./128.,.0);
  float hL=texture2D(uHeight,uv-d.xy).r,hR=texture2D(uHeight,uv+d.xy).r;
  float hD=texture2D(uHeight,uv-d.yx).r,hU=texture2D(uHeight,uv+d.yx).r;
  vec3 n=normalize(vec3((hL-hR)*uAmp*60.,(hD-hU)*uAmp*60.,1.));
  vWN=normalize((modelMatrix*vec4(n,0.)).xyz);
  gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.);
}`,
  fragmentShader:`
uniform vec3 uColor1,uColor2,uSun,uEye;
uniform float uTime;uniform sampler2D uNormal;
varying vec2 vUV;varying float vH;varying vec3 vWP,vWN;
void main(){
  vec3 n=normalize(vWN);
  vec3 v=normalize(uEye-vWP);
  /* Fresnel */
  float F=pow(1.-max(0.,dot(n,v)),4.)*.85+.05;
  /* Spéculaire solaire */
  float spec=pow(max(0.,dot(reflect(-uSun,n),v)),180.);
  float spec2=pow(max(0.,dot(reflect(-uSun,n),v)),20.)*.15;
  /* Couleur eau */
  float cr=smoothstep(-.25,.35,vH);
  vec3 col=mix(uColor1*.6,uColor2,cr);
  col=mix(col,vec3(.9,.97,1.),spec*2.5+spec2);
  /* Réflexion env bleue */
  col=mix(col,uColor2*.9,F*.5);
  /* Caustiques animées */
  float t=uTime;
  float ca=sin(vUV.x*18.-t*2.2)*sin(vUV.y*18.-t*1.8)*.5+.5;
  float cb=sin((vUV.x+vUV.y)*14.-t*2.8)*.5+.5;
  col+=uColor2*ca*cb*.12;
  /* Écume crêtes */
  float foam=smoothstep(.18,.42,vH);
  col=mix(col,vec3(.92,.97,1.),foam*.6);
  float alpha=mix(.78,.96,F)+foam*.08;
  gl_FragColor=vec4(col,alpha);
}`
});
const surfMesh=new THREE.Mesh(surfGeo,surfMat);
surfMesh.position.y=-.05;
cubeGroup.add(surfMesh);

/* ══ Volume eau (visible depuis les côtés) ══ */
const waterY=0;
const clipP=new THREE.Plane(new THREE.Vector3(0,-1,0),HB*.96);
renderer.localClippingEnabled=true;

const volMat=new THREE.MeshPhysicalMaterial({
  color:pal().vol,metalness:0,roughness:.0,transparent:true,opacity:.6,depthWrite:false,
  transmission:.7,ior:1.333,thickness:2.2,
  attenuationColor:new THREE.Color(pal().att),attenuationDistance:1.0,
  clearcoat:.4,clearcoatRoughness:.05,side:THREE.BackSide,
  clippingPlanes:[clipP]});
cubeGroup.add(new THREE.Mesh(new THREE.BoxGeometry(BOX*.97,BOX*.97,BOX*.97),volMat));

/* ══ Parois verre ══ */
const glassMat=new THREE.MeshPhysicalMaterial({
  color:0xB8D8FF,metalness:0,roughness:.02,transparent:true,opacity:.07,depthWrite:false,
  transmission:.94,ior:1.50,clearcoat:1,clearcoatRoughness:.02,
  side:THREE.DoubleSide,envMapIntensity:1.8});
cubeGroup.add(new THREE.Mesh(new THREE.BoxGeometry(BOX,BOX,BOX),glassMat));
const edgeMat=new THREE.LineBasicMaterial({color:pal().edge,transparent:true,opacity:.65,
  blending:THREE.AdditiveBlending,depthWrite:false});
cubeGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(BOX,BOX,BOX)),edgeMat));

/* Sol */
const floor=new THREE.Mesh(new THREE.PlaneGeometry(14,14),new THREE.ShadowMaterial({opacity:.32}));
floor.rotation.x=-Math.PI/2;floor.position.y=-H-.01;floor.receiveShadow=true;scene.add(floor);

/* ══ Interaction ══ */
const rot={x:.25,y:-.4};let drag=false,lX=0,lY=0,rX=0,rY=0,prevRX=0,prevRY=0,angVX=0,angVZ=0;
renderer.domElement.addEventListener('pointerdown',e=>{
  drag=true;lX=e.clientX;lY=e.clientY;rX=rY=0;
  renderer.domElement.setPointerCapture(e.pointerId);
});
renderer.domElement.addEventListener('pointerup',()=>drag=false);
renderer.domElement.addEventListener('pointermove',e=>{
  if(!drag)return;
  const dx=(e.clientX-lX)*.007,dy=(e.clientY-lY)*.006;
  prevRX=rot.x;prevRY=rot.y;
  rot.y+=dx;rot.x+=dy;lX=e.clientX;lY=e.clientY;rX=dy;rY=dx;
  angVX=(rot.x-prevRX)*60;angVZ=(rot.y-prevRY)*60;
  e.preventDefault();
},{passive:false});
addEventListener('wheel',e=>{camZT=THREE.MathUtils.clamp(camZT+e.deltaY*.012,3,14);},{passive:true});
let P0=0;
renderer.domElement.addEventListener('touchstart',e=>{if(e.touches.length===2)
  P0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
renderer.domElement.addEventListener('touchmove',e=>{if(e.touches.length===2){
  const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  camZT=THREE.MathUtils.clamp(camZT-(d-P0)*.025,3,14);P0=d;e.preventDefault();
}},{passive:false});

let pendingDrop=null;
document.getElementById('bS').addEventListener('click',()=>{
  pendingDrop={x:.2+Math.random()*.6,y:.2+Math.random()*.6,z:1.2+Math.random()*.6,w:.14};});
document.getElementById('bF').addEventListener('click',()=>{
  /* vortex = 4 drops décalés en cercle */
  const t=performance.now()*.001;
  [0,1,2,3].forEach(i=>{setTimeout(()=>{
    pendingDrop={x:.5+Math.cos(i*1.57+t)*.28,y:.5+Math.sin(i*1.57+t)*.28,z:.7,w:.08};
  },i*80);});
});
document.getElementById('bC').addEventListener('click',()=>{
  pi=(pi+1)%PAL.length;const p=pal();
  volMat.color.setHex(p.vol);volMat.attenuationColor.setHex(p.att);
  surfMat.uniforms.uColor1.value.setHex(p.surf1);
  surfMat.uniforms.uColor2.value.setHex(p.surf2);
  edgeMat.color.setHex(p.edge);
});
renderer.domElement.addEventListener('click',e=>{
  if(drag)return;
  pendingDrop={x:e.clientX/innerWidth,y:e.clientY/innerHeight,z:.9,w:.1};
});

/* ══ Boucle ══ */
let last=performance.now();
const _iQ=new THREE.Quaternion(),_gL=new THREE.Vector3();

function tick(now){
  requestAnimationFrame(tick);
  const dt=Math.min((now-last)/1000,.04);last=now;

  /* Rotation cube avec inertie */
  if(!drag){rot.y+=rY;rot.x+=rX;rX*=.87;rY*=.87;}
  rot.x=THREE.MathUtils.clamp(rot.x,-1.4,1.4);
  cubeGroup.rotation.set(rot.x,rot.y,0);

  /* ⚡ CLÉ : gravité dans repère local du cube */
  _iQ.copy(cubeGroup.quaternion).invert();
  _gL.set(0,-1,0).applyQuaternion(_iQ);
  /* Ces composantes X,Z alimentent le simulateur → vrai slosh physique */
  simMat.uniforms.uGX.value=_gL.x*2.5;
  simMat.uniforms.uGZ.value=_gL.z*2.5;

  /* Simulation GPU une passe */
  stepSim(pendingDrop);pendingDrop=null;

  /* Mettre à jour la surface */
  surfMat.uniforms.uHeight.value=rtA.texture;
  surfMat.uniforms.uNormal.value=rtNorm.texture;
  surfMat.uniforms.uTime.value=now*.001;
  surfMat.uniforms.uSun.value.copy(sun.position).normalize();

  /* Zoom camera */
  camera.position.z+=(camZT-camera.position.z)*.1;

  /* Lumières caustic (monde) */
  const t=now*.001;
  cL.position.set(Math.cos(t*.45)*5.5,3.8+Math.sin(t*.28),Math.sin(t*.45)*5.5);
  cL.intensity=3.2+1.2*Math.sin(t*.65);
  cL.color.setHSL(.57+Math.sin(t*.15)*.04,.95,.58);
  cL2.position.set(Math.cos(t*.3+2.5)*4.5,-2.2,Math.sin(t*.3+2.5)*4.5);
  cL2.intensity=.7+.5*Math.sin(t*1.05);
  /* Lumière sous la surface : suit le bas du cube */
  wL.position.set(0,-H*.5,0).applyMatrix4(cubeGroup.matrixWorld);
  wL.intensity=1.2+.4*Math.sin(t*.9);

  composer.render();
}
requestAnimationFrame(tick);

addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  composer.setSize(innerWidth,innerHeight);
  rt.setSize(innerWidth*DPR,innerHeight*DPR);
});
</script></body></html>
