<!DOCTYPE html><html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SSFR Fluid</title>
<script type="importmap">{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
}}</script>
<style>*{margin:0;padding:0}body{background:#010812;overflow:hidden;touch-action:none}
#ui{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.b{background:rgba(0,40,120,.3);border:1px solid rgba(40,110,255,.3);color:rgba(100,180,255,.9);
  font:700 9.5px/1 monospace;letter-spacing:2px;padding:10px 16px;border-radius:100px;
  cursor:pointer;text-transform:uppercase;touch-action:manipulation;user-select:none}
.b:active{opacity:.6;transform:scale(.93)}
#i{position:fixed;top:12px;right:12px;color:rgba(40,120,255,.3);font:9px monospace}</style>
</head><body>
<div id="i"></div>
<div id="ui">
  <button class="b" id="bS">💧 Vague</button>
  <button class="b" id="bA">🌀 Auto</button>
  <button class="b" id="bC">🎨 Teinte</button>
</div>
<script type="module">
import * as THREE from 'three';

const DPR=Math.min(devicePixelRatio,2);
const W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:false});
renderer.setPixelRatio(DPR);renderer.setSize(W,H);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.08;
document.body.appendChild(renderer.domElement);

/* Résolution des passes SSFR (demi-res pour perf) */
const SW=Math.floor(W*DPR*.5),SH=Math.floor(H*DPR*.5);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x010812);
const cam=new THREE.PerspectiveCamera(40,W/H,.1,60);
cam.position.set(0,1.5,8.5);cam.lookAt(0,-.2,0);
let camZT=8.5;

/* ══ Lumières ══ */
scene.add(new THREE.AmbientLight(0x6090C0,.3));
const sun=new THREE.DirectionalLight(0xEEF5FF,1.1);
sun.position.set(5,12,4);scene.add(sun);
const cL=new THREE.PointLight(0x30C0FF,3.5,16);scene.add(cL);
const cL2=new THREE.PointLight(0xFF6020,.9,10);scene.add(cL2);

/* ══ Décor cube ══ */
const BOX=3,HB=BOX/2;
const cubeGroup=new THREE.Group();scene.add(cubeGroup);
const glas=new THREE.MeshPhysicalMaterial({color:0xA8D0FF,transparent:true,opacity:.07,
  depthWrite:false,transmission:.95,ior:1.5,clearcoat:1,clearcoatRoughness:.02,
  side:THREE.DoubleSide,roughness:.02,metalness:0});
cubeGroup.add(new THREE.Mesh(new THREE.BoxGeometry(BOX,BOX,BOX),glas));
const eM=new THREE.LineBasicMaterial({color:0x40A0FF,transparent:true,opacity:.65,
  blending:THREE.AdditiveBlending,depthWrite:false});
cubeGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(BOX,BOX,BOX)),eM));
/* Sol */
const flr=new THREE.Mesh(new THREE.PlaneGeometry(12,12),
  new THREE.MeshStandardMaterial({color:0x040A18,roughness:1,metalness:0}));
flr.rotation.x=-Math.PI/2;flr.position.y=-HB-.02;scene.add(flr);

/* ══ PHYSIQUE SPH ══ */
const PR_PHYS=0.125; // rayon physique
const PR_REND=0.21;  // rayon de rendu (plus grand → surface SSFR plus lisse)
const WALL=HB-PR_PHYS-.003;
const SMOOTH=PR_PHYS*2.4,SMOOTH2=SMOOTH*SMOOTH;
const REST_D=7,PRESS_K=.4,VISC=.06,G=12;

/* Remplissage compact du bas du cube (grille régulière) */
const SP=PR_PHYS*2.05; // espacement grille
const nX=Math.floor((BOX-2*PR_PHYS)/SP),nZ=nX;
const nY=Math.floor(HB/SP); // demi-hauteur
const NP=nX*nY*nZ;
console.log(`SPH: ${NP} particules (${nX}×${nY}×${nZ})`);
const px_=new Float32Array(NP*3),pv_=new Float32Array(NP*3);
const den=new Float32Array(NP),prs=new Float32Array(NP);
const fx_=new Float32Array(NP),fy_=new Float32Array(NP),fz_=new Float32Array(NP);
let ip=0;
for(let iy=0;iy<nY;iy++)for(let ix=0;ix<nX;ix++)for(let iz=0;iz<nZ;iz++){
  px_[ip*3]=(-HB+PR_PHYS)+ix*SP+(Math.random()-.5)*.005;
  px_[ip*3+1]=(-HB+PR_PHYS)+iy*SP+(Math.random()-.5)*.005;
  px_[ip*3+2]=(-HB+PR_PHYS)+iz*SP+(Math.random()-.5)*.005;
  ip++;
}

/* Grille spatiale */
const CS=SMOOTH,GD=Math.ceil(BOX/CS)+4,GD2=GD*GD;
const MC=24;
const gCnt=new Int16Array(GD*GD2),gL=new Int16Array(GD*GD2*MC);
function gI(x,y,z){
  const ix=Math.floor((x+HB+CS*1.5)/CS),iy=Math.floor((y+HB+CS*1.5)/CS),iz=Math.floor((z+HB+CS*1.5)/CS);
  return(ix*GD+iy)*GD+iz;
}
const W6=315/(64*Math.PI*Math.pow(SMOOTH,9));
const WSP=-45/(Math.PI*Math.pow(SMOOTH,6));
const WV=45/(Math.PI*Math.pow(SMOOTH,6));
const _iQ=new THREE.Quaternion(),_gL=new THREE.Vector3();

function sph(dt){
  gCnt.fill(0);
  for(let i=0;i<NP;i++){const k=gI(px_[i*3],px_[i*3+1],px_[i*3+2]);if(gCnt[k]<MC){gL[k*MC+gCnt[k]]=i;gCnt[k]++;}}
  /* densité */
  for(let i=0;i<NP;i++){
    const ix=Math.floor((px_[i*3]+HB+CS*1.5)/CS),iy=Math.floor((px_[i*3+1]+HB+CS*1.5)/CS),iz=Math.floor((px_[i*3+2]+HB+CS*1.5)/CS);
    let d=0;
    for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++)for(let dz=-1;dz<=1;dz++){
      const k=((ix+dx)*GD+(iy+dy))*GD+(iz+dz);if(k<0||k>=GD*GD2)continue;
      const c=gCnt[k];
      for(let ci=0;ci<c;ci++){const j=gL[k*MC+ci];
        const rx=px_[i*3]-px_[j*3],ry=px_[i*3+1]-px_[j*3+1],rz=px_[i*3+2]-px_[j*3+2];
        const r2=rx*rx+ry*ry+rz*rz;if(r2<SMOOTH2){const q=SMOOTH2-r2;d+=W6*q*q*q;}
      }
    }
    den[i]=d;prs[i]=PRESS_K*(d-REST_D);
  }
  /* forces */
  fx_.fill(0);fy_.fill(0);fz_.fill(0);
  for(let i=0;i<NP;i++){
    const ix=Math.floor((px_[i*3]+HB+CS*1.5)/CS),iy=Math.floor((px_[i*3+1]+HB+CS*1.5)/CS),iz=Math.floor((px_[i*3+2]+HB+CS*1.5)/CS);
    for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++)for(let dz=-1;dz<=1;dz++){
      const k=((ix+dx)*GD+(iy+dy))*GD+(iz+dz);if(k<0||k>=GD*GD2)continue;
      const c=gCnt[k];
      for(let ci=0;ci<c;ci++){const j=gL[k*MC+ci];if(j<=i)continue;
        const rx=px_[i*3]-px_[j*3],ry=px_[i*3+1]-px_[j*3+1],rz=px_[i*3+2]-px_[j*3+2];
        const r2=rx*rx+ry*ry+rz*rz;
        if(r2<SMOOTH2&&r2>1e-9){
          const r=Math.sqrt(r2),hr=SMOOTH-r;
          const dd=Math.max(den[i]*den[j],1e-5);
          const fp=WSP*hr*hr/r*(prs[i]+prs[j])*.5/dd;
          fx_[i]+=fp*rx;fy_[i]+=fp*ry;fz_[i]+=fp*rz;
          fx_[j]-=fp*rx;fy_[j]-=fp*ry;fz_[j]-=fp*rz;
          const fv=VISC*WV*hr/dd;
          fx_[i]+=fv*(pv_[j*3]-pv_[i*3]);fy_[i]+=fv*(pv_[j*3+1]-pv_[i*3+1]);fz_[i]+=fv*(pv_[j*3+2]-pv_[i*3+2]);
          fx_[j]-=fv*(pv_[j*3]-pv_[i*3]);fy_[j]-=fv*(pv_[j*3+1]-pv_[i*3+1]);fz_[j]-=fv*(pv_[j*3+2]-pv_[i*3+2]);
        }
      }
    }
  }
  /* intégration + parois */
  for(let i=0;i<NP;i++){
    pv_[i*3]+=(fx_[i]+_gL.x*G)*dt;pv_[i*3+1]+=(fy_[i]+_gL.y*G)*dt;pv_[i*3+2]+=(fz_[i]+_gL.z*G)*dt;
    px_[i*3]+=pv_[i*3]*dt;px_[i*3+1]+=pv_[i*3+1]*dt;px_[i*3+2]+=pv_[i*3+2]*dt;
    const B=.3,F=.97;
    ['x','y','z'].forEach((_,a)=>{
      if(px_[i*3+a]<-WALL){px_[i*3+a]=-WALL;pv_[i*3+a]=Math.abs(pv_[i*3+a])*B;pv_[i*3+(a+1)%3]*=F;pv_[i*3+(a+2)%3]*=F;}
      if(px_[i*3+a]> WALL){px_[i*3+a]= WALL;pv_[i*3+a]=-Math.abs(pv_[i*3+a])*B;pv_[i*3+(a+1)%3]*=F;pv_[i*3+(a+2)%3]*=F;}
    });
  }
}

/* ══ RENDU SSFR ══ */
const rtO={type:THREE.FloatType,format:THREE.RGBAFormat,
  minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,depthBuffer:true};
const depthRT=new THREE.WebGLRenderTarget(SW,SH,rtO);
const blurRT =new THREE.WebGLRenderTarget(SW,SH,{...rtO,depthBuffer:false});
const normRT  =new THREE.WebGLRenderTarget(SW,SH,{...rtO,depthBuffer:false});
const bgRT    =new THREE.WebGLRenderTarget(W*DPR,H*DPR,{...rtO,depthBuffer:true});
const ssfrCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const ssfrScene=new THREE.Scene();
const sQ=()=>new THREE.Mesh(new THREE.PlaneGeometry(2,2));

/* Pass 1 : particules → depth (gl_PointCoord sphères) */
const ptGeo=new THREE.BufferGeometry();
const ptPos=new THREE.BufferAttribute(new Float32Array(NP*3),3);
ptPos.setUsage(THREE.DynamicDrawUsage);ptGeo.setAttribute('position',ptPos);
const _tmp=new THREE.Vector3(),_cMat=new THREE.Matrix4();
const depScene=new THREE.Scene();
const PALETTES=[
  {c:0x1266EE,deep:0x001840,foam:0x90D0FF},
  {c:0x10B070,deep:0x001A10,foam:0x90FFD0},
  {c:0xB020B0,deep:0x200028,foam:0xFF90FF},
  {c:0xC86010,deep:0x1E0800,foam:0xFFD080},
];
let pi=0;
const ptMat=new THREE.ShaderMaterial({
  uniforms:{uR:{value:PR_REND},uFov:{value:cam.fov*Math.PI/180}},
  vertexShader:`
uniform float uR,uFov;
varying vec3 vVC;
void main(){
  vec4 mv=modelViewMatrix*vec4(position,1.);
  vVC=mv.xyz;
  gl_Position=projectionMatrix*mv;
  float k=1./tan(uFov*.5);
  gl_PointSize=uR*k/(-mv.z)*${SH}.;
}`,
  fragmentShader:`
uniform float uR;uniform mat4 projectionMatrix;
varying vec3 vVC;
void main(){
  vec2 c=gl_PointCoord*2.-1.;float r2=dot(c,c);if(r2>1.)discard;
  float dz=sqrt(1.-r2)*uR;
  vec3 sp=vVC+vec3(0,0,dz);
  vec4 clip=projectionMatrix*vec4(sp,1.);
  gl_FragDepth=clip.z/clip.w*.5+.5;
  gl_FragColor=vec4(-sp.z,c.x*sqrt(1.-r2),c.y*sqrt(1.-r2),sqrt(1.-r2));
}`,depthTest:true,depthWrite:true
});
const pts=new THREE.Points(ptGeo,ptMat);
depScene.add(pts);

/* Pass 2 : bilateral blur */
const blurMat=new THREE.ShaderMaterial({
  uniforms:{uT:{value:depthRT.texture},uRes:{value:new THREE.Vector2(SW,SH)}},
  vertexShader:`void main(){gl_Position=vec4(position,1.);}`,
  fragmentShader:`
uniform sampler2D uT;uniform vec2 uRes;
#define R 12
void main(){
  vec2 uv=gl_FragCoord.xy/uRes,px=1./uRes;
  vec4 cc=texture2D(uT,uv);float d=cc.r;
  if(d<.01){gl_FragColor=vec4(0);return;}
  float ws=0.;vec4 acc=vec4(0.);
  for(int x=-R;x<=R;x++)for(int y=-R;y<=R;y++){
    vec4 s=texture2D(uT,uv+vec2(x,y)*px);if(s.r<.01)continue;
    float sw=exp(-float(x*x+y*y)*.032)*exp(-(d-s.r)*(d-s.r)*12.);
    acc+=s*sw;ws+=sw;
  }
  gl_FragColor=ws>0.?acc/ws:cc;
}`,depthTest:false,depthWrite:false
});
const blurQ=sQ();blurQ.material=blurMat;

/* Pass 3 : normales */
const normMat_=new THREE.ShaderMaterial({
  uniforms:{uT:{value:blurRT.texture},uRes:{value:new THREE.Vector2(SW,SH)},uP:{value:cam.projectionMatrix}},
  vertexShader:`void main(){gl_Position=vec4(position,1.);}`,
  fragmentShader:`
uniform sampler2D uT;uniform vec2 uRes;uniform mat4 uP;
vec3 unp(vec2 uv,float d){float x=(uv.x*2.-1.)/uP[0][0],y=(uv.y*2.-1.)/uP[1][1];return vec3(x,y,-1.)*d;}
void main(){
  vec2 uv=gl_FragCoord.xy/uRes,px=1./uRes;
  float d=texture2D(uT,uv).r;if(d<.01){gl_FragColor=vec4(0);return;}
  float dL=texture2D(uT,uv-vec2(px.x,0)).r,dR=texture2D(uT,uv+vec2(px.x,0)).r;
  float dD=texture2D(uT,uv-vec2(0,px.y)).r,dU=texture2D(uT,uv+vec2(0,px.y)).r;
  vec3 p=unp(uv,d);
  vec3 pL=unp(uv-vec2(px.x,0),dL>.01?dL:d),pR=unp(uv+vec2(px.x,0),dR>.01?dR:d);
  vec3 pD=unp(uv-vec2(0,px.y),dD>.01?dD:d),pU=unp(uv+vec2(0,px.y),dU>.01?dU:d);
  vec3 n=normalize(cross(pR-pL,pU-pD));
  gl_FragColor=vec4(n*.5+.5,1.);
}`,depthTest:false,depthWrite:false
});
const normQ=sQ();normQ.material=normMat_;

/* Pass 4 : composite final */
const pal=()=>PALETTES[pi];
const compMat=new THREE.ShaderMaterial({
  uniforms:{uD:{value:blurRT.texture},uN:{value:normRT.texture},uBG:{value:bgRT.texture},
    uRes:{value:new THREE.Vector2(W*DPR,H*DPR)},uSRes:{value:new THREE.Vector2(SW,SH)},
    uTime:{value:0},uColor:{value:new THREE.Color(pal().c)},
    uDeep:{value:new THREE.Color(pal().deep)},uFoam:{value:new THREE.Color(pal().foam)},
    uSun:{value:new THREE.Vector3(.45,.9,.35).normalize()},
    uViewInv:{value:new THREE.Matrix4()},uP:{value:cam.projectionMatrix}},
  vertexShader:`void main(){gl_Position=vec4(position,1.);}`,
  fragmentShader:`
uniform sampler2D uD,uN,uBG;
uniform vec2 uRes,uSRes;uniform float uTime;
uniform vec3 uColor,uDeep,uFoam,uSun;
uniform mat4 uViewInv,uP;
vec3 unp(vec2 uv,float d){float x=(uv.x*2.-1.)/uP[0][0],y=(uv.y*2.-1.)/uP[1][1];return vec3(x,y,-1.)*d;}
void main(){
  vec2 uv=gl_FragCoord.xy/uRes;
  vec2 suv=(gl_FragCoord.xy/uRes)*uSRes/uSRes; // same
  float d=texture2D(uD,uv*uSRes/uRes).r; // resample au ratio
  vec3 bg=texture2D(uBG,uv).rgb;
  if(d<.01){gl_FragColor=vec4(bg,1.);return;}
  vec3 nV=texture2D(uN,uv*uSRes/uRes).rgb*2.-1.;
  vec3 nW=normalize((uViewInv*vec4(nV,0.)).xyz);
  vec3 posV=unp(uv*uSRes/uRes,d);
  vec3 posW=(uViewInv*vec4(posV,1.)).xyz;
  vec3 eyeW=(uViewInv*vec4(0,0,0,1.)).xyz;
  vec3 vd=normalize(eyeW-posW);
  float F=pow(1.-max(0.,dot(nW,vd)),4.)*.85+.04;
  float sp=pow(max(0.,dot(reflect(-uSun,nW),vd)),240.);
  float sp2=pow(max(0.,dot(reflect(-uSun,nW),vd)),16.)*.1;
  /* Réfraction : fond décalé par la normale */
  vec3 refr=texture2D(uBG,uv+nW.xy*.055).rgb;
  /* Couleur eau */
  float dp=clamp(d*.35,0.,1.);
  vec3 wc=mix(uColor,uDeep,dp);
  /* Écume */
  float foam=smoothstep(.65,.9,nV.z);
  wc=mix(wc,uFoam,foam*.6);
  /* Caustiques */
  float caus=(sin(posW.x*9.-uTime*2.)*sin(posW.z*9.-uTime*1.7)*.5+.5);
  wc+=uColor*.12*caus*caus*(1.-dp);
  /* Composite Fresnel */
  vec3 col=mix(refr*.65+wc*.35,nW*.15+uColor*.5,F*.65);
  col+=vec3(.92,.97,1.)*sp*2.5+wc*sp2;
  gl_FragColor=vec4(col,1.);
}`,depthTest:false,depthWrite:false
});
const compQ=sQ();compQ.material=compMat;

/* ══ Rotation & contrôles ══ */
const rot={x:.3,y:-.38};let drag=false,lX=0,lY=0,rX=0,rY=0,autoRot=false;
renderer.domElement.addEventListener('pointerdown',e=>{drag=true;lX=e.clientX;lY=e.clientY;rX=rY=0;renderer.domElement.setPointerCapture(e.pointerId);});
renderer.domElement.addEventListener('pointerup',()=>drag=false);
renderer.domElement.addEventListener('pointermove',e=>{if(!drag)return;const dx=(e.clientX-lX)*.007,dy=(e.clientY-lY)*.006;rot.y+=dx;rot.x+=dy;lX=e.clientX;lY=e.clientY;rX=dy;rY=dx;e.preventDefault();},{passive:false});
addEventListener('wheel',e=>{camZT=THREE.MathUtils.clamp(camZT+e.deltaY*.012,3,14);},{passive:true});
let P0=0;
renderer.domElement.addEventListener('touchstart',e=>{if(e.touches.length===2)P0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
renderer.domElement.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);camZT=THREE.MathUtils.clamp(camZT-(d-P0)*.025,3,14);P0=d;e.preventDefault();}},{passive:false});
document.getElementById('bS').addEventListener('click',()=>{for(let i=0;i<NP;i++){pv_[i*3]+=(Math.random()-.5)*5;pv_[i*3+1]+=Math.random()*6+2;pv_[i*3+2]+=(Math.random()-.5)*5;}});
document.getElementById('bA').addEventListener('click',e=>{autoRot=!autoRot;e.target.textContent=autoRot?'⏹ Stop':'🌀 Auto';});
document.getElementById('bC').addEventListener('click',()=>{pi=(pi+1)%PALETTES.length;const p=pal();compMat.uniforms.uColor.value.setHex(p.c);compMat.uniforms.uDeep.value.setHex(p.deep);compMat.uniforms.uFoam.value.setHex(p.foam);eM.color.setHex(p.c);});

/* ══ Boucle ══ */
let last=performance.now(),fps=60,fc=0;const iEl=document.getElementById('i');

function tick(now){
  requestAnimationFrame(tick);
  const dt=Math.min((now-last)/1000,.033);last=now;
  fc++;if(fc%30===0)iEl.textContent=`${NP}p · ${Math.round(fps)}fps`;
  fps=fps*.9+.1/Math.max(dt,.008);

  if(!drag&&!autoRot){rot.y+=rY;rot.x+=rX;rX*=.87;rY*=.87;}
  if(autoRot){rot.y+=.009;rot.x=.3+Math.sin(now*.00035)*.25;}
  rot.x=THREE.MathUtils.clamp(rot.x,-1.35,1.35);
  cubeGroup.rotation.set(rot.x,rot.y,0);
  cam.position.z+=(camZT-cam.position.z)*.1;
  cam.updateMatrixWorld();

  /* Gravité locale → SPH */
  _iQ.copy(cubeGroup.quaternion).invert();
  _gL.set(0,-1,0).applyQuaternion(_iQ);
  sph(dt*.5);sph(dt*.5); // 2 sous-pas

  /* Transformer particules en world-space pour le rendu */
  _cMat.copy(cubeGroup.matrixWorld);
  for(let i=0;i<NP;i++){
    _tmp.set(px_[i*3],px_[i*3+1],px_[i*3+2]).applyMatrix4(_cMat);
    ptPos.setXYZ(i,_tmp.x,_tmp.y,_tmp.z);
  }
  ptPos.needsUpdate=true;

  /* Uniforms */
  compMat.uniforms.uViewInv.value.copy(cam.matrixWorld);
  compMat.uniforms.uTime.value=now*.001;
  compMat.uniforms.uSun.value.set(Math.cos(now*.0003),1,Math.sin(now*.0003)).normalize();
  ptMat.uniforms.uFov.value=cam.fov*Math.PI/180;

  /* PASS 0 — fond (décor sans particules) */
  pts.visible=false;
  renderer.setRenderTarget(bgRT);renderer.render(scene,cam);

  /* PASS 1 — profondeur sphères */
  pts.visible=true;
  renderer.setRenderTarget(depthRT);renderer.clear(true,true,false);
  renderer.render(depScene,cam);

  /* PASS 2 — blur bilatéral */
  ssfrScene.add(blurQ);
  renderer.setRenderTarget(blurRT);renderer.render(ssfrScene,ssfrCam);
  ssfrScene.remove(blurQ);

  /* PASS 3 — normales */
  ssfrScene.add(normQ);
  renderer.setRenderTarget(normRT);renderer.render(ssfrScene,ssfrCam);
  ssfrScene.remove(normQ);

  /* PASS 4 — composite sur écran */
  pts.visible=false;
  renderer.setRenderTarget(null);renderer.render(scene,cam);
  renderer.autoClear=false;
  ssfrScene.add(compQ);renderer.render(ssfrScene,ssfrCam);ssfrScene.remove(compQ);
  renderer.autoClear=true;
  pts.visible=true;

  /* Lumières */
  const t=now*.001;
  cL.position.set(Math.cos(t*.45)*5.5,3.8+Math.sin(t*.28)*.6,Math.sin(t*.45)*5.5);
  cL.intensity=3.+1.*Math.sin(t*.65);
  cL2.position.set(Math.cos(t*.32+2.)*4.5,-1.8,Math.sin(t*.32+2.)*4.5);
}
requestAnimationFrame(tick);
addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();});
</script></body></html>
